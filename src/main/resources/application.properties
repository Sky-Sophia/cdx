spring.application.name=property-management-system

spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/${DB_NAME:archive_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:07966556167}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

spring.sql.init.mode=never

mybatis.type-aliases-package=org.example.javawebdemo.model
mybatis.configuration.map-underscore-to-camel-case=true

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.devtools.restart.enabled=false
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

management.endpoints.web.exposure.include=health,info

spring.task.scheduling.pool.size=0
