# ====================== \u5E94\u7528\u57FA\u7840\u914D\u7F6E ======================
spring.application.name=property-management-system

# ====================== \u6570\u636E\u5E93\u8FDE\u63A5\u914D\u7F6E ======================
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/${DB_NAME:archive_db}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
# \u6570\u636E\u5E93\u7528\u6237\u540D\uFF08\u9ED8\u8BA4root\uFF09
spring.datasource.username=${DB_USER:root}
# \u6570\u636E\u5E93\u5BC6\u7801\uFF08\u9ED8\u8BA4\u5BC6\u7801\uFF09
spring.datasource.password=${DB_PASSWORD:07966556167}
# \u6570\u636E\u5E93\u9A71\u52A8\u7C7B\uFF08MySQL8+\u9A71\u52A8\uFF09
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
# \u6570\u636E\u5E93\u521D\u59CB\u5316\u811A\u672C\u6267\u884C\u6A21\u5F0F\uFF1Anever=\u4ECE\u4E0D\u81EA\u52A8\u6267\u884Cschema.sql\u3001data.sql\u7B49\u521D\u59CB\u5316\u811A\u672C
spring.sql.init.mode=never

# ====================== MyBatis \u914D\u7F6E ======================
# MyBatis \u522B\u540D\u5305\u626B\u63CF\u8DEF\u5F84\uFF0C\u7B80\u5316\u5B9E\u4F53\u7C7B\u5F15\u7528
mybatis.type-aliases-package=org.example.propertyms.**.model
# \u5F00\u542F\u6570\u636E\u5E93\u4E0B\u5212\u7EBF\u5B57\u6BB5 \u81EA\u52A8\u6620\u5C04 \u4E3AJava\u9A7C\u5CF0\u547D\u540D\u5C5E\u6027
mybatis.configuration.map-underscore-to-camel-case=true

# ====================== Web \u524D\u7AEF/\u7F16\u7801\u914D\u7F6E ======================
# Thymeleaf\u6A21\u677F\u5F15\u64CE\uFF1A\u5173\u95ED\u7F13\u5B58
spring.thymeleaf.cache=false
# Thymeleaf\u7F16\u7801\u683C\u5F0F
spring.thymeleaf.encoding=UTF-8
# \u56FD\u9645\u5316\u6D88\u606F\u6587\u4EF6\u57FA\u7840\u540D
spring.messages.basename=messages
# \u56FD\u9645\u5316\u7F16\u7801\u683C\u5F0F
spring.messages.encoding=UTF-8
# \u70ED\u90E8\u7F72\u91CD\u542F\u529F\u80FD\uFF1A\u5173\u95ED
spring.devtools.restart.enabled=false
# \u5F00\u542FServlet\u7F16\u7801\u8FC7\u6EE4
server.servlet.encoding.enabled=true
# Servlet\u8BF7\u6C42/\u54CD\u5E94\u7F16\u7801
server.servlet.encoding.charset=UTF-8
# \u5F3A\u5236\u4F7F\u7528\u914D\u7F6E\u7684\u7F16\u7801\uFF0C\u8986\u76D6\u8BF7\u6C42\u4E2D\u7684\u9ED8\u8BA4\u7F16\u7801
server.servlet.encoding.force=true
# \u4F1A\u8BDD\u8D85\u65F6\u65F6\u95F4\uFF1A30\u5206\u949F
server.servlet.session.timeout=30m
# Cookie\u8BBE\u7F6EHttpOnly\uFF0C\u9632\u6B62XSS\u653B\u51FB\u83B7\u53D6Cookie
server.servlet.session.cookie.http-only=true
# Cookie\u540C\u6E90\u7B56\u7565\u4E25\u683C\u6A21\u5F0F\uFF0C\u63D0\u5347\u5B89\u5168\u6027
server.servlet.session.cookie.same-site=strict

# ====================== \u6587\u4EF6\u4E0A\u4F20\u914D\u7F6E ======================
# \u5355\u4E2A\u6587\u4EF6\u6700\u5927\u4E0A\u4F20\u5927\u5C0F\uFF1A2MB
spring.servlet.multipart.max-file-size=5MB
# \u5355\u6B21\u8BF7\u6C42\u6700\u5927\u4E0A\u4F20\u603B\u5927\u5C0F\uFF1A2MB
spring.servlet.multipart.max-request-size=10MB

# ====================== \u76D1\u63A7\u7AEF\u70B9\u914D\u7F6E ======================
# \u66B4\u9732\u7684Actuator\u76D1\u63A7\u7AEF\u70B9\uFF1A\u4EC5\u5F00\u653E\u5065\u5EB7\u68C0\u67E5\u548C\u5E94\u7528\u4FE1\u606F
management.endpoints.web.exposure.include=health,info

# ====================== \u5B9A\u65F6\u4EFB\u52A1\u914D\u7F6E ======================
# \u5B9A\u65F6\u4EFB\u52A1\u7EBF\u7A0B\u6C60\u5927\u5C0F\uFF1A0\uFF08\u5173\u95ED\u5B9A\u65F6\u4EFB\u52A1\uFF09
spring.task.scheduling.pool.size=0

# ====================== \u9759\u6001\u8D44\u6E90\u7F13\u5B58\u914D\u7F6E ======================
# \u9759\u6001\u8D44\u6E90\u7F13\u5B58\u63A7\u5236\uFF1A\u6D4F\u89C8\u5668\u7F13\u5B58\u65F6\u957F0\u79D2\uFF08\u4E0D\u7F13\u5B58\uFF0C\u5F00\u53D1\u73AF\u5883\u7528\uFF09
spring.web.resources.cache.cachecontrol.max-age=0
