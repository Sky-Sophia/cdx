spring.application.name=java-web-demo

# DataSource (adjust to your local MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cinema_db?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:07966556167}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.sql.init.mode=never
# i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
# DB schema/data are managed externally.
# spring.sql.init.schema-locations=classpath:db/schema.sql
# spring.sql.init.data-locations=classpath:db/data.sql

mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=org.example.javawebdemo.model
mybatis.configuration.map-underscore-to-camel-case=true

spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.web.resources.static-locations=classpath:/static/,file:./uploads/

app.upload-dir=./uploads
app.seat-lock-minutes=15
app.refund-before-minutes=60
