spring.datasource.url=jdbc:h2:mem:property_pms_local;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema-h2.sql
spring.sql.init.data-locations=classpath:db/data-h2.sql

spring.thymeleaf.encoding=UTF-8
spring.messages.basename=messages
spring.messages.encoding=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=strict

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

management.endpoints.web.exposure.include=health,info

app.bootstrap.admin-password=${BOOTSTRAP_ADMIN_PASSWORD:Property@123}
app.bootstrap.staff-password=${BOOTSTRAP_STAFF_PASSWORD:Staff@123}
app.bootstrap.finance-password=${BOOTSTRAP_FINANCE_PASSWORD:Finance@123}
