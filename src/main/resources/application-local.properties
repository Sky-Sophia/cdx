# Local profile uses H2 for quick startup without MySQL
spring.datasource.url=jdbc:h2:mem:java_web_demo;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.sql.init.mode=never
# i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8
# DB schema/data are managed externally.
# spring.sql.init.schema-locations=classpath:db/schema-h2.sql
# spring.sql.init.data-locations=classpath:db/data-h2.sql
