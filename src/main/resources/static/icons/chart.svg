<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
    <!-- 外框 -->
    <rect x="5" y="5" width="38" height="38" rx="5"
          stroke="#000000" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 四根柱状条，底部对齐，等间距，高度有节奏感 -->
    <line x1="13" y1="35" x2="13" y2="28"
          stroke="#000000" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="35" x2="20" y2="23"
          stroke="#000000" stroke-width="4" stroke-linecap="round"/>
    <line x1="27" y1="35" x2="27" y2="17"
          stroke="#000000" stroke-width="4" stroke-linecap="round"/>
    <line x1="34" y1="35" x2="34" y2="12"
          stroke="#000000" stroke-width="4" stroke-linecap="round"/>
    <!-- 趋势圆点，点缀在柱顶，增加精致感 -->
    <circle cx="13" cy="28" r="1.5" fill="#000000"/>
    <circle cx="20" cy="23" r="1.5" fill="#000000"/>
    <circle cx="27" cy="17" r="1.5" fill="#000000"/>
    <circle cx="34" cy="12" r="1.5" fill="#000000"/>
</svg>
