<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
    <defs>
        <!-- 裁切区域：整个画布减去红点区域，铃铛线条在红点处被"吃掉" -->
        <clipPath id="bell-clip">
            <path d="M0 0h48v48H0z"/>
            <circle cx="33" cy="14" r="6" />
        </clipPath>
    </defs>

    <!-- 铃铛主体（被红点区域裁切） -->
    <g clip-path="url(#bell-clip)" clip-rule="evenodd">
        <path d="M18 34C18 37.3137 20.6863 40 24 40C27.3137 40 30 37.3137 30 34"
              stroke="#000000" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M12 34H36C36 34 34 30 34 22C34 16.4772 29.5228 12 24 12C18.4772 12 14 16.4772 14 22C14 30 12 34 12 34Z"
              stroke="#000000" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="24" cy="10" r="2" stroke="#000000" stroke-width="3.5"/>
    </g>

    <!-- 红点 — 半嵌入铃铛右上边缘 -->
    <circle cx="33" cy="14" r="5" fill="#FF3B30"/>
</svg>
