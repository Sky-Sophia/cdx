<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>影片排片</title>
    <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main>
    <div class="card">
        <div class="card-head">
            <h2>影片排片</h2>
            <a class="btn" href="/">返回影片</a>
        </div>
        <form class="form-inline" method="get" action="/shows">
            <div class="form-row">
                <label>日期</label>
                <input type="date" name="date" th:value="${date}" />
            </div>
            <div class="form-row">
                <label>影片</label>
                <select name="movieId">
                    <option value="">全部</option>
                    <option th:each="m : ${movies}" th:value="${m.id}" th:text="${m.title}" th:selected="${movieId == m.id}"></option>
                </select>
            </div>
            <div class="form-row">
                <label>影厅</label>
                <select name="hallId">
                    <option value="">全部</option>
                    <option th:each="h : ${halls}" th:value="${h.id}" th:text="${h.name}" th:selected="${hallId == h.id}"></option>
                </select>
            </div>
            <div class="form-actions">
                <button class="btn" type="submit">筛选</button>
                <a class="btn" href="/shows">重置</a>
            </div>
        </form>
    </div>

    <div th:if="${#lists.isEmpty(shows)}" class="empty-state">暂无排片</div>
    <div class="card" th:if="${!#lists.isEmpty(shows)}">
        <table class="table">
            <thead>
            <tr>
                <th>影片</th>
                <th>影厅</th>
                <th>开始</th>
                <th>结束</th>
                <th>票价</th>
                <th class="table-actions">操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="show : ${shows}">
                <td th:text="${movieMap[show.movieId] != null ? movieMap[show.movieId].title : '影片已删除'}"></td>
                <td th:text="${hallMap[show.hallId] != null ? hallMap[show.hallId].name : '影厅已删除'}"></td>
                <td th:text="${show.startTime}"></td>
                <td th:text="${show.endTime}"></td>
                <td th:text="${show.finalPrice}"></td>
                <td class="table-actions">
                    <a class="btn primary" th:href="@{'/shows/' + ${show.id}}">选座购票</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
