<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物业系统 - 个人中心</title>
    <link rel="stylesheet" href="/css/apps/profile.css" />
</head>

<body>
<div class="container">

    <div class="user-header">
        <div class="avatar">
            <img th:src="@{/images/default_avatar.png}" alt="头像">
        </div>
        <div class="user-info">
            <h1>管理员 您好</h1>
            <p>admin@wuye.com</p>
            <p>物业系统管理员 · 2023-09-01 入职</p>
        </div>
    </div>

    <div class="section-title">基本信息</div>
    <div class="info-grid">
        <div class="info-item">
            <div class="label">姓名</div>
            <div class="value">管理员</div>
        </div>
        <div class="info-item">
            <div class="label">账号</div>
            <div class="value">admin</div>
        </div>
        <div class="info-item">
            <div class="label">手机号码</div>
            <div class="value">19970440365</div>
        </div>
        <div class="info-item">
            <div class="label">邮箱</div>
            <div class="value">admin@wuye.com</div>
        </div>
        <div class="info-item">
            <div class="label">角色权限</div>
            <div class="value">超级管理员</div>
        </div>
        <div class="info-item">
            <div class="label">账号状态</div>
            <div class="value">正常 · 已启用</div>
        </div>
    </div>

    <div class="section-title">账号功能</div>
    <div class="func-list">
        <div class="func-item">
            <div class="func-left">
                <span class="ico"><img src="/icons/lock.svg" alt="lock"></span>
                <div class="func-name">修改密码</div>
            </div>
            <div class="func-arrow">›</div>
        </div>
        <div class="func-item">
            <div class="func-left">
                <span class="ico"><img src="/icons/speaker.svg" alt="lock"></span>
                <div class="func-name">消息通知</div>
            </div>
            <div class="func-arrow">›</div>
        </div>
        <div class="func-item">
            <div class="func-left">
                <span class="ico"><img src="/icons/shield-fill.svg" alt="lock"></span>
                <div class="func-name">安全中心</div>
            </div>
            <div class="func-arrow">›</div>
        </div>
        <div class="func-item">
            <div class="func-left">
                <span class="ico"><img src="/icons/phone-one.svg" alt="lock"></span>
                <div class="func-name">绑定/修改邮箱</div>
            </div>
            <div class="func-arrow">›</div>
        </div>
        <!-- 退出登录 无下划线 整行可点 -->
        <a href="/logout"
           class="func-item profile-logout-link"
           data-confirm-message="确定要退出登录吗？"
           data-confirm-confirm-text="退出登录"
           data-confirm-tone="danger">
            <div class="func-left">
    <span class="ico">
      <img src="/icons/door-exit.svg" alt="退出登录">
    </span>
                <div class="func-name">退出登录</div>
            </div>
            <div class="func-arrow">›</div>
        </a>
    </div>

</div>

<div th:replace="~{fragments/layout :: confirmModal}"></div>
</body>
</html>
