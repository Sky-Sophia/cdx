<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN"
      th:fragment="page(pageTitle, code, heading, desc, themeClass)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">错误页面</title>
    <link rel="stylesheet" href="/css/pages/error.css" th:href="@{/css/pages/error.css}">
</head>
<body th:class="${themeClass}">
<div class="wrap">
    <img class="error-icon" th:src="@{/icons/error.svg}" alt="错误图标">
    <div class="code" th:text="${code}">404</div>
    <div class="divider"></div>
    <div class="title" th:text="${heading}">页面未找到</div>
    <div class="desc" th:text="${desc}">你访问的地址不存在或已被移除</div>
</div>
</body>
</html>
