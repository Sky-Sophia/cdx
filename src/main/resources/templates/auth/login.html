<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 - 物业运营平台管理系统</title>
    <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="auth-portal-body">
<main class="auth-portal-card" th:attr="data-initial-tab=${tab}">
    <header class="auth-portal-header">
        <div class="auth-portal-logo" aria-hidden="true">
            <span class="logo-ring"></span>
            <span class="logo-key"></span>
        </div>
        <div>
            <h1>物业运营平台管理系统</h1>
            <p>请登录您的账号进行管理</p>
        </div>
    </header>

    <nav class="auth-portal-tabs slide-tabs">
        <button type="button"
                class="auth-tab-btn"
                data-tab-target="login"
                th:classappend="${tab != 'register'} ? ' is-active'">登录</button>
        <button type="button"
                class="auth-tab-btn"
                data-tab-target="register"
                th:classappend="${tab == 'register'} ? ' is-active'">注册</button>
        <span class="slide-underline" aria-hidden="true"></span>
    </nav>

    <div class="auth-portal-msg">
        <div th:replace="~{fragments :: messages}"></div>
    </div>

    <section class="auth-portal-section auth-portal-section-login"
             th:classappend="${tab == 'register'} ? ' is-hidden'">
        <form method="post" action="/login" class="auth-portal-form" id="loginForm">
            <label class="auth-portal-label" for="login-username">用户名</label>
            <div class="auth-portal-input-wrap">
                <span class="auth-portal-icon">👤</span>
                <input id="login-username"
                       name="username"
                       th:value="${loginUsername}"
                       placeholder="请输入用户名"
                       autocomplete="username"
                       minlength="3"
                       maxlength="20"
                       required />
            </div>

            <label class="auth-portal-label" for="login-password">密码</label>
            <div class="auth-portal-input-wrap">
                <span class="auth-portal-icon">🔒</span>
                <input id="login-password"
                       name="password"
                       type="password"
                       placeholder="请输入密码"
                       autocomplete="current-password"
                       minlength="6"
                       maxlength="32"
                       required />
                <button class="auth-portal-eye"
                        type="button"
                        data-target="login-password"
                        aria-label="显示或隐藏密码">👁</button>
            </div>

            <div class="auth-portal-meta">
                <label class="auth-portal-remember">
                    <input type="checkbox" name="rememberMe" />
                    <span>记住我</span>
                </label>
                <button type="button" class="auth-portal-link-btn" data-switch-tab="register">去注册</button>
            </div>

            <button class="auth-portal-submit" id="loginSubmit" type="submit" disabled>登录系统</button>
        </form>
    </section>

    <section class="auth-portal-section auth-portal-section-register"
             th:classappend="${tab != 'register'} ? ' is-hidden'">
        <form method="post" action="/register" class="auth-portal-form" id="registerForm">
            <label class="auth-portal-label" for="register-username">用户名</label>
            <div class="auth-portal-input-wrap">
                <span class="auth-portal-icon">👤</span>
                <input id="register-username"
                       name="username"
                       th:value="${registerUsername}"
                       placeholder="请输入3-20位用户名"
                       autocomplete="username"
                       minlength="3"
                       maxlength="20"
                       required />
            </div>

            <label class="auth-portal-label" for="register-password">密码</label>
            <div class="auth-portal-input-wrap">
                <span class="auth-portal-icon">🔒</span>
                <input id="register-password"
                       name="password"
                       type="password"
                       placeholder="请输入6-32位密码"
                       autocomplete="new-password"
                       minlength="6"
                       maxlength="32"
                       required />
                <button class="auth-portal-eye"
                        type="button"
                        data-target="register-password"
                        aria-label="显示或隐藏密码">👁</button>
            </div>

            <label class="auth-portal-label" for="register-confirm-password">确认密码</label>
            <div class="auth-portal-input-wrap">
                <span class="auth-portal-icon">🔒</span>
                <input id="register-confirm-password"
                       name="confirmPassword"
                       type="password"
                       placeholder="请再次输入密码"
                       autocomplete="new-password"
                       minlength="6"
                       maxlength="32"
                       required />
                <button class="auth-portal-eye"
                        type="button"
                        data-target="register-confirm-password"
                        aria-label="显示或隐藏密码">👁</button>
            </div>

            <button class="auth-portal-submit" type="submit">立即注册</button>
        </form>
    </section>
</main>

<script>
    (() => {
        const card = document.querySelector(".auth-portal-card");
        const initialTab = card ? card.getAttribute("data-initial-tab") : "login";
        const tabButtons = document.querySelectorAll(".auth-tab-btn");
        const tabNav = document.querySelector(".auth-portal-tabs");
        const tabUnderline = tabNav ? tabNav.querySelector(".slide-underline") : null;
        const loginSection = document.querySelector(".auth-portal-section-login");
        const registerSection = document.querySelector(".auth-portal-section-register");
        const quickSwitch = document.querySelectorAll("[data-switch-tab]");

        function setUnderline(targetBtn) {
            if (!tabUnderline || !targetBtn) return;
            tabUnderline.style.width = `${targetBtn.offsetWidth}px`;
            tabUnderline.style.left = `${targetBtn.offsetLeft}px`;
        }

        function switchTab(tab) {
            const target = tab === "register" ? "register" : "login";
            if (loginSection) {
                loginSection.classList.toggle("is-hidden", target !== "login");
            }
            if (registerSection) {
                registerSection.classList.toggle("is-hidden", target !== "register");
            }
            tabButtons.forEach((btn) => {
                const isActive = btn.getAttribute("data-tab-target") === target;
                btn.classList.toggle("is-active", isActive);
            });
            setUnderline(Array.from(tabButtons).find((btn) => btn.classList.contains("is-active")));
        }

        tabButtons.forEach((btn) => {
            btn.addEventListener("click", () => {
                switchTab(btn.getAttribute("data-tab-target"));
            });
        });

        quickSwitch.forEach((btn) => {
            btn.addEventListener("click", () => {
                switchTab(btn.getAttribute("data-switch-tab"));
            });
        });

        document.querySelectorAll(".auth-portal-eye").forEach((btn) => {
            btn.addEventListener("click", () => {
                const targetId = btn.getAttribute("data-target");
                const input = document.getElementById(targetId);
                if (!input) return;
                input.type = input.type === "password" ? "text" : "password";
            });
        });

        const form = document.getElementById("loginForm");
        const username = document.getElementById("login-username");
        const password = document.getElementById("login-password");
        const submit = document.getElementById("loginSubmit");

        function updateLoginState() {
            if (!submit || !username || !password) return;
            const valid = username.value.trim().length >= 3 && password.value.length >= 6;
            submit.disabled = !valid;
        }

        if (username) {
            username.addEventListener("input", updateLoginState);
            username.addEventListener("change", updateLoginState);
        }
        if (password) {
            password.addEventListener("input", updateLoginState);
            password.addEventListener("change", updateLoginState);
        }
        if (form) {
            form.addEventListener("submit", (event) => {
                updateLoginState();
                if (submit && submit.disabled) {
                    event.preventDefault();
                }
            });
        }

        updateLoginState();
        setTimeout(updateLoginState, 120);
        switchTab(initialTab);
        window.addEventListener("resize", () => {
            setUnderline(Array.from(tabButtons).find((btn) => btn.classList.contains("is-active")));
        });
    })();
</script>
</body>
</html>
