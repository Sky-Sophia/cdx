<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>修改密码</title>
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260321a" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico?v=20260321a" />
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="stack-lg">
    <section class="page-header">
        <div>
            <p class="page-kicker">Security</p>
            <h1 class="page-title">修改密码</h1>
            <p class="page-subtitle">先验证旧密码，再设置并确认新密码。</p>
        </div>
        <div class="page-actions">
            <a class="btn" href="/profile">返回个人中心</a>
        </div>
    </section>

    <section class="card password-flow-card">
        <div class="password-flow-steps">
            <span class="flow-step active">1 验证身份</span>
            <span class="flow-step-sep">›</span>
            <span class="flow-step active">2 设置新密码</span>
        </div>
        <div th:replace="~{fragments :: messages}"></div>
        <form class="form-compact password-flow-form" method="post" action="/profile/password">
            <div class="form-row">
                <label for="old-password">旧密码</label>
                <div class="input-group">
                    <input id="old-password"
                           name="oldPassword"
                           type="password"
                           autocomplete="current-password"
                           minlength="6"
                           maxlength="32"
                           required />
                    <button class="toggle-btn" type="button" data-toggle="password" data-target="old-password">显示</button>
                </div>
            </div>
            <div class="form-row">
                <label for="new-password">新密码</label>
                <div class="input-group">
                    <input id="new-password"
                           name="newPassword"
                           type="password"
                           autocomplete="new-password"
                           minlength="6"
                           maxlength="32"
                           required />
                    <button class="toggle-btn" type="button" data-toggle="password" data-target="new-password">显示</button>
                </div>
                <div class="input-hint">长度 6-32 位，建议包含字母与数字组合。</div>
            </div>
            <div class="form-row">
                <label for="confirm-password">确认新密码</label>
                <div class="input-group">
                    <input id="confirm-password"
                           name="confirmPassword"
                           type="password"
                           autocomplete="new-password"
                           minlength="6"
                           maxlength="32"
                           required />
                    <button class="toggle-btn" type="button" data-toggle="password" data-target="confirm-password">显示</button>
                </div>
            </div>
            <div class="form-actions">
                <button class="btn primary" type="submit">保存新密码</button>
                <a class="btn" href="/profile">取消</a>
            </div>
        </form>
        <p class="auth-hint">修改成功后，建议重新登录以确保会话安全。</p>
    </section>
</main>
<script>
    (function () {
        var toggles = document.querySelectorAll('[data-toggle="password"]');
        toggles.forEach(function (btn) {
            btn.addEventListener('click', function () {
                var targetId = btn.getAttribute('data-target');
                if (!targetId) {
                    return;
                }
                var input = document.getElementById(targetId);
                if (!input) {
                    return;
                }
                var isText = input.type === 'text';
                input.type = isText ? 'password' : 'text';
                btn.textContent = isText ? '显示' : '隐藏';
            });
        });
        var newPassword = document.getElementById('new-password');
        var confirmPassword = document.getElementById('confirm-password');
        function validateMatch() {
            if (!newPassword || !confirmPassword) {
                return;
            }
            if (confirmPassword.value && confirmPassword.value !== newPassword.value) {
                confirmPassword.setCustomValidity('两次输入的密码不一致');
            } else {
                confirmPassword.setCustomValidity('');
            }
        }
        if (newPassword && confirmPassword) {
            newPassword.addEventListener('input', validateMatch);
            confirmPassword.addEventListener('input', validateMatch);
        }
    })();
</script>
</body>
</html>
