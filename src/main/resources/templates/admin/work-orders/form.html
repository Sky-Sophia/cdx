<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>新建工单 - 物业后台管理系统</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="stylesheet" href="/css/apps/admin.css?v=20260413-notice-detail-modal" />
    <link rel="stylesheet" href="/css/apps/admin-archive-create.css" th:href="@{/css/apps/admin-archive-create.css}" />
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: topbar('work-orders')}"></div>
    <div th:replace="~{fragments/layout :: sidebar('work-orders')}"></div>

    <main class="app-main">
        <div th:replace="~{fragments/layout :: messages}"></div>

        <section class="archive-create-page">
            <form method="post" action="/admin/work-orders/save" class="archive-create-form">
                <div class="archive-create-card">
                    <div class="archive-top-bar"></div>
                    <div th:replace="~{fragments/admin-archive :: archiveHeader(
                            ${'工单编号：待生成'},
                            ${'报修<br />工单'},
                            ${'报修工单登记表'},
                            ${'WORK ORDER REGISTRATION'})}"></div>

                    <div class="archive-create-body">
                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label" id="work-order-unit-label">报修房屋</label>
                                <div class="custom-select archive-create-control" data-required>
                                    <input type="hidden" name="unitId" th:value="${workOrder.unitId}" required />
                                    <button type="button" class="custom-select-trigger" aria-expanded="false"
                                            aria-labelledby="work-order-unit-label work-order-unit-trigger-text">
                                        <span class="custom-select-trigger-text" id="work-order-unit-trigger-text">请选择房屋</span>
                                        <span class="custom-select-arrow" aria-hidden="true"></span>
                                    </button>
                                    <ul class="custom-select-panel">
                                        <li class="custom-select-option" data-value="" data-label="请选择房屋"
                                            th:classappend="${workOrder.unitId == null} ? ' is-selected'">请选择房屋</li>
                                        <li th:each="unit : ${units}"
                                            class="custom-select-option"
                                            th:attr="data-value=${unit.id},data-label=${unit.unitNo}"
                                            th:classappend="${workOrder.unitId == unit.id} ? ' is-selected'"
                                            th:text="${unit.unitNo}"></li>
                                    </ul>
                                </div>
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label">报 修 人</label>
                                <label>
                                    <input class="archive-create-control" type="text" value="系统将按房屋自动关联当前在住住户" readonly />
                                </label>
                            </div>
                        </div>

                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label">联系电话</label>
                                <label>
                                    <input class="archive-create-control" type="text" value="联系电话将随住户档案自动带出" readonly />
                                </label>
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label" id="work-order-category-label">工单类别</label>
                                <div class="custom-select archive-create-control">
                                    <input type="hidden" name="category"
                                           th:value="${workOrder.category != null and workOrder.category != '' ? workOrder.category : '水电维修'}" />
                                    <button type="button" class="custom-select-trigger" aria-expanded="false"
                                            aria-labelledby="work-order-category-label work-order-category-trigger-text">
                                        <span class="custom-select-trigger-text" id="work-order-category-trigger-text"
                                              th:text="${workOrder.category != null and workOrder.category != '' ? workOrder.category : '水电维修'}">水电维修</span>
                                        <span class="custom-select-arrow" aria-hidden="true"></span>
                                    </button>
                                    <ul class="custom-select-panel">
                                        <li class="custom-select-option" data-value="水电维修" data-label="水电维修"
                                            th:classappend="${workOrder.category == null or workOrder.category == '' or workOrder.category == '水电维修'} ? ' is-selected'">水电维修</li>
                                        <li class="custom-select-option" data-value="门禁设备" data-label="门禁设备"
                                            th:classappend="${workOrder.category == '门禁设备'} ? ' is-selected'">门禁设备</li>
                                        <li class="custom-select-option" data-value="公区环境" data-label="公区环境"
                                            th:classappend="${workOrder.category == '公区环境'} ? ' is-selected'">公区环境</li>
                                        <li class="custom-select-option" data-value="其他" data-label="其他"
                                            th:classappend="${workOrder.category == '其他'} ? ' is-selected'">其他</li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label" id="work-order-priority-label">优 先 级</label>
                                <div class="custom-select archive-create-control">
                                    <input type="hidden" name="priority"
                                           th:value="${workOrder.priority != null ? workOrder.priority : 'HIGH'}" />
                                    <button type="button" class="custom-select-trigger" aria-expanded="false"
                                            aria-labelledby="work-order-priority-label work-order-priority-trigger-text">
                                        <span class="custom-select-trigger-text" id="work-order-priority-trigger-text"
                                              th:text="${workOrder.priority == 'MEDIUM'} ? '中' : (${workOrder.priority == 'LOW'} ? '低' : '高')">高</span>
                                        <span class="custom-select-arrow" aria-hidden="true"></span>
                                    </button>
                                    <ul class="custom-select-panel">
                                        <li class="custom-select-option" data-value="HIGH" data-label="高"
                                            th:classappend="${workOrder.priority == null or workOrder.priority == 'HIGH'} ? ' is-selected'">高</li>
                                        <li class="custom-select-option" data-value="MEDIUM" data-label="中"
                                            th:classappend="${workOrder.priority == 'MEDIUM'} ? ' is-selected'">中</li>
                                        <li class="custom-select-option" data-value="LOW" data-label="低"
                                            th:classappend="${workOrder.priority == 'LOW'} ? ' is-selected'">低</li>
                                    </ul>
                                </div>
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label">处理人员</label>
                                <input class="archive-create-control archive-create-control--readonly" type="text" value="工单开始处理后自动关联当前员工" readonly />
                            </div>
                        </div>

                        <div class="archive-create-row-single is-textarea">
                            <label class="archive-create-label" for="work-order-description">问题描述</label>
                            <textarea class="archive-create-control" id="work-order-description" name="description" rows="4" placeholder="请填写报修详情" th:text="${workOrder.description}" required></textarea>
                        </div>
                    </div>
                    <div th:replace="~{fragments/admin-archive :: archiveFooter(
                            ${'登记日期 ' + #temporals.format(#temporals.createNow(), 'yyyy年M月d日')},
                            @{/admin/work-orders},
                            ${'取　消'},
                            ${'创建工单'},
                            ${false})}"></div>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
