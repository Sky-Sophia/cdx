<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>影厅表单</title>
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260321a" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico?v=20260321a" />
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="stack-lg">
    <section class="page-header">
        <div>
            <p class="page-kicker">Admin</p>
            <h1 class="page-title" th:text="${hall.id == null ? '新增影厅' : '编辑影厅'}">影厅信息</h1>
            <p class="page-subtitle">配置影厅基础参数与座位分布。</p>
        </div>
        <div class="page-actions">
            <a class="btn" href="/admin/halls">返回列表</a>
        </div>
    </section>

    <div th:replace="~{fragments :: messages}"></div>

    <div class="card">
        <form class="form-compact" method="post" action="/admin/halls/save">
            <input type="hidden" name="id" th:value="${hall.id}" />
            <div class="form-row">
                <label>影厅名称</label>
                <input name="name" th:value="${hall.name}" required />
            </div>
            <div class="form-row">
                <label>影厅类型</label>
                <select name="hallType">
                    <option th:each="t : ${types}" th:value="${t}" th:text="${t.label}" th:selected="${hall.hallType == t}"></option>
                </select>
            </div>
            <div class="form-row">
                <label>行数</label>
                <input name="rows" type="number" th:value="${rows}" min="1" required />
            </div>
            <div class="form-row">
                <label>列数</label>
                <input name="cols" type="number" th:value="${cols}" min="1" required />
            </div>
            <div class="form-row">
                <label>禁用座位（格式：1-1,1-2）</label>
                <input name="disabledSeats" th:value="${disabledSeats}" placeholder="例如：1-1,1-2,3-8" />
                <div class="input-hint">用于表示不可售座位，留空则全部可售。</div>
            </div>
            <div class="form-actions">
                <button class="btn primary" type="submit">保存</button>
                <a class="btn" href="/admin/halls">取消</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
