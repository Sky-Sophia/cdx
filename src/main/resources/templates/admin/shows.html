<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>排片管理</title>
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260321a" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico?v=20260321a" />
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="stack-lg">
    <section class="page-header">
        <div>
            <p class="page-kicker">Admin</p>
            <h1 class="page-title">排片管理</h1>
            <p class="page-subtitle">按日期、影片、影厅快速筛选并维护场次。</p>
        </div>
        <div class="page-actions">
            <a class="btn primary" href="/admin/shows/new">新增排片</a>
        </div>
    </section>

    <div th:replace="~{fragments :: messages}"></div>

    <div class="card">
        <form class="form-inline" method="get" action="/admin/shows">
            <div class="form-row">
                <label>日期</label>
                <input type="date" name="date" />
            </div>
            <div class="form-row">
                <label>影片</label>
                <select name="movieId">
                    <option value="">全部</option>
                    <option th:each="m : ${movies}" th:value="${m.id}" th:text="${m.title}"></option>
                </select>
            </div>
            <div class="form-row">
                <label>影厅</label>
                <select name="hallId">
                    <option value="">全部</option>
                    <option th:each="h : ${halls}" th:value="${h.id}" th:text="${h.name}"></option>
                </select>
            </div>
            <div class="form-actions">
                <button class="btn" type="submit">筛选</button>
                <a class="btn" href="/admin/shows">重置</a>
            </div>
        </form>
    </div>

    <div class="card">
        <div class="card-head">
            <h2>场次列表</h2>
            <span class="badge" th:text="${#lists.size(shows)} + ' 场'">0 场</span>
        </div>
        <div th:if="${#lists.isEmpty(shows)}" class="empty-state">当前筛选条件下暂无排片。</div>
        <div class="table-wrap" th:if="${!#lists.isEmpty(shows)}">
            <table class="table">
                <thead>
                <tr>
                    <th>影片</th>
                    <th>影厅</th>
                    <th>开始</th>
                    <th>结束</th>
                    <th>票价</th>
                    <th>状态</th>
                    <th class="table-actions">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="show : ${shows}">
                    <td th:text="${movieMap[show.movieId] != null ? movieMap[show.movieId].title : '影片已删除'}"></td>
                    <td th:text="${hallMap[show.hallId] != null ? hallMap[show.hallId].name : '影厅已删除'}"></td>
                    <td th:text="${show.startTime}"></td>
                    <td th:text="${show.endTime}"></td>
                    <td th:text="${show.finalPrice}"></td>
                    <td><span class="badge" th:text="${show.status.label}" th:attr="data-status=${show.status.name()}"></span></td>
                    <td class="table-actions">
                        <form class="inline-form" method="post" th:action="@{'/admin/shows/cancel/' + ${show.id}}">
                            <button class="btn danger" type="submit">取消</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
