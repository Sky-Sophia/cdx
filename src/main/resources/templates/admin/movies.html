<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>影片管理</title>
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260321a" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico?v=20260321a" />
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="stack-lg">
    <section class="page-header">
        <div>
            <p class="page-kicker">Admin</p>
            <h1 class="page-title">影片管理</h1>
            <p class="page-subtitle">影片资料已锁定，只保留查看能力，排片请转至排片管理。</p>
        </div>
        <div class="page-actions">
            <a class="btn primary" href="/admin/shows">去排片管理</a>
        </div>
    </section>

    <div th:replace="~{fragments :: messages}"></div>

    <div class="card">
        <div class="card-head">
            <h2>影片列表</h2>
            <span class="badge" data-tone="neutral">仅查看，编辑已禁用</span>
        </div>
        <div th:if="${#lists.isEmpty(movies)}" class="empty-state">暂无影片数据。</div>
        <div class="table-wrap" th:if="${!#lists.isEmpty(movies)}">
            <table class="table">
                <thead>
                <tr>
                    <th>名称</th>
                    <th>类型</th>
                    <th>时长</th>
                    <th>状态</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="movie : ${movies}">
                    <td th:text="${movie.title}"></td>
                    <td th:text="${movie.genre}"></td>
                    <td th:text="${movie.durationMinutes}"></td>
                    <td><span class="badge" th:text="${movie.status.label}" th:attr="data-status=${movie.status.name()}"></span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
