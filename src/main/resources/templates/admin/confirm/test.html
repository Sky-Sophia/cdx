<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二次确认弹窗</title>
    <link rel="stylesheet" href="/css/components/confirm-modal.css" />
    <link rel="stylesheet" href="/css/pages/admin/confirm-demo.css" />
</head>
<body>
<div class="demo-wrap">
    <div class="demo-head">
        <h1>通用二次确认弹窗示例</h1>
        <p>该页面演示系统中的通用确认组件如何以声明式方式调用。</p>
    </div>

    <div class="demo-list">
        <a href="/logout"
           class="func-item"
           data-confirm-message="确定要退出登录吗？"
           data-confirm-confirm-text="退出登录"
           data-confirm-tone="danger">
            <div class="func-left">
                <span class="ico">
                    <img src="/icons/door-exit.svg" alt="退出登录">
                </span>
                <div class="func-name">退出登录</div>
            </div>
            <div class="func-arrow">›</div>
        </a>

        <form action="#" method="post" data-confirm-message="确定要删除该记录吗？" data-confirm-confirm-text="确认删除" data-confirm-tone="danger">
            <button class="func-item" type="submit">
                <span class="func-left">
                    <span class="ico">
                        <img src="/icons/shield-fill.svg" alt="删除">
                    </span>
                    <span class="func-name">删除记录</span>
                </span>
                <span class="func-arrow">›</span>
            </button>
        </form>
    </div>
</div>

<div class="confirm-modal" id="globalConfirmModal" aria-hidden="true">
    <div class="confirm-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="globalConfirmTitle" aria-describedby="globalConfirmMessage">
        <h3 class="confirm-modal-title" id="globalConfirmTitle">操作确认</h3>
        <p class="confirm-modal-message" id="globalConfirmMessage">确定要执行此操作吗？</p>
        <div class="confirm-modal-actions">
            <button class="confirm-modal-btn" id="globalConfirmCancel" type="button">取消</button>
            <button class="confirm-modal-btn primary" id="globalConfirmOk" type="button">确定</button>
        </div>
    </div>
</div>

<script src="/js/common/confirm-actions.js" defer></script>

</body>
</html>
