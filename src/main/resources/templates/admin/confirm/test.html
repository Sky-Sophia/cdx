<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>二次确认弹窗</title>
    <style>
        /* 基础样式保持原样 */
        .func-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            cursor: pointer;
            text-decoration: none !important;
            color: #333;
            border: 1px solid #eee;
            border-radius: 8px;
            margin: 20px;
        }
        .func-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ico img {
            width: 20px;
            height: 20px;
        }
        .func-arrow {
            font-size: 18px;
            color: #999;
        }
        a, a:link, a:visited, a:hover, a:active {
            text-decoration: none !important;
            border: none !important;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .modal-box {
            background: #fff;
            width: 280px;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .modal-title {
            font-size: 16px;
            margin-bottom: 20px;
            color: #333;
        }
        .modal-btns {
            display: flex;
            gap: 12px;
        }
        .modal-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-cancel {
            background: #f5f5f5;
            color: #666;
        }
        .btn-confirm {
            background: #ff4757;
            color: #fff;
        }
    </style>
</head>
<body>

<!-- 示例触发按钮 -->
<a href="javascript:;" class="func-item confirm-action"
   data-message="确定要退出登录吗？"
   data-action="/logout">
    <div class="func-left">
    <span class="ico">
      <img src="/images/door-exit.svg" alt="退出登录">
    </span>
        <div class="func-name">退出登录</div>
    </div>
    <div class="func-arrow">›</div>
</a>

<a href="javascript:;" class="func-item confirm-action"
   data-message="确定要删除该记录吗？"
   data-action="deleteRecord(123)">
    <div class="func-left">
    <span class="ico">
      <img src="/images/delete.svg" alt="删除">
    </span>
        <div class="func-name">删除记录</div>
    </div>
    <div class="func-arrow">›</div>
</a>

<!-- 通用弹窗 -->
<div class="modal-overlay" id="confirmModal">
    <div class="modal-box">
        <div class="modal-title" id="modalMessage">提示信息</div>
        <div class="modal-btns">
            <button class="modal-btn btn-cancel" id="btnCancel">取消</button>
            <button class="modal-btn btn-confirm" id="btnConfirm">确定</button>
        </div>
    </div>
</div>

<script>
    const modal = document.getElementById('confirmModal')
    const modalMessage = document.getElementById('modalMessage')
    const btnCancel = document.getElementById('btnCancel')
    const btnConfirm = document.getElementById('btnConfirm')

    let confirmAction = null // 保存当前触发动作

    // 为所有需要确认的元素绑定事件
    document.querySelectorAll('.confirm-action').forEach(el => {
        el.addEventListener('click', () => {
            const message = el.getAttribute('data-message') || '确定要执行此操作吗？'
            const action = el.getAttribute('data-action')
            modalMessage.textContent = message
            confirmAction = action
            modal.style.display = 'flex'
        })
    })

    btnCancel.onclick = () => {
        modal.style.display = 'none'
        confirmAction = null
    }

    btnConfirm.onclick = () => {
        modal.style.display = 'none'
        if (!confirmAction) return
        // 判断是函数调用还是跳转链接
        if (confirmAction.endsWith(')')) {
            try {
                eval(confirmAction)
            } catch(e) {
                console.error('执行操作失败:', e)
            }
        } else {
            window.location.href = confirmAction
        }
        confirmAction = null
    }

    // 示例删除函数
    function deleteRecord(id) {
        alert('已删除记录ID: ' + id)
        // 可替换为实际删除请求
    }
</script>

</body>
</html>
