<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${editing} ? '编辑住户' : '新增住户'">住户表单</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link rel="stylesheet" href="/css/apps/admin.css" />
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: topbar('residents')}"></div>
    <div th:replace="~{fragments/layout :: sidebar('residents')}"></div>

    <main class="app-main">
        <section class="page-head compact">
            <h1 th:text="${editing} ? '编辑住户档案' : '新增住户档案'"></h1>
            <a class="btn ghost" href="/admin/residents">返回列表</a>
        </section>

        <section class="panel form-panel">
            <form method="post" action="/admin/residents/save" class="form-grid">
                <input type="hidden" name="id" th:value="${resident.id}" />

                <label>
                    所属房屋
                    <select name="unitId" required>
                        <option value="">请选择房屋</option>
                        <option th:each="unit : ${units}" th:value="${unit.id}" th:text="${unit.unitNo}" th:selected="${resident.unitId == unit.id}"></option>
                    </select>
                </label>

                <label>
                    姓名
                    <input name="name" th:value="${resident.name}" required />
                </label>

                <label>
                    手机号
                    <input name="phone" th:value="${resident.phone}" />
                </label>

                <label>
                    证件号
                    <input name="identityNo" th:value="${resident.identityNo}" />
                </label>

                <label>
                    住户类型
                    <select name="residentType">
                        <option value="OWNER" th:selected="${resident.residentType == 'OWNER'}">业主</option>
                        <option value="TENANT" th:selected="${resident.residentType == 'TENANT'}">租户</option>
                        <option value="FAMILY" th:selected="${resident.residentType == 'FAMILY'}">家属</option>
                    </select>
                </label>

                <label>
                    状态
                    <select name="status">
                        <option value="ACTIVE" th:selected="${resident.status == 'ACTIVE'}">在住</option>
                        <option value="MOVED_OUT" th:selected="${resident.status == 'MOVED_OUT'}">已迁出</option>
                    </select>
                </label>

                <label>
                    入住日期
                    <input type="date" name="moveInDate" th:value="${resident.moveInDate}" />
                </label>

                <label>
                    迁出日期
                    <input type="date" name="moveOutDate" th:value="${resident.moveOutDate}" />
                </label>

                <div class="form-actions">
                    <button class="btn primary" type="submit">保存</button>
                    <a class="btn ghost" href="/admin/residents">取消</a>
                </div>
            </form>
        </section>
    </main>
</div>
</body>
</html>
