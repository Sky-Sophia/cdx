<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${editing} ? '编辑住户' : '新增住户'">住户表单</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="stylesheet" href="/css/apps/admin.css?v=20260408-all-date-pickers" />
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: topbar('residents')}"></div>
    <div th:replace="~{fragments/layout :: sidebar('residents')}"></div>

    <main class="app-main">
        <div th:replace="~{fragments/layout :: messages}"></div>

        <section class="page-head compact form-page-head">
            <div class="page-head-copy">
                <h1 th:text="${editing} ? '编辑住户档案' : '新增住户档案'">住户档案</h1>
                <p>统一记录住户身份、联系方式与入住状态，让住户信息与房屋档案、工单和费用模块保持关联一致。</p>
            </div>
            <a class="btn ghost" href="/admin/residents">返回列表</a>
        </section>

        <section class="form-layout">
            <div class="form-main">
                <section class="panel form-panel">
                    <form method="post" action="/admin/residents/save" class="form-grid"
                          th:attr="data-confirm-message=${editing ? '确认保存对该住户档案的修改吗？' : null},
                                   data-confirm-confirm-text=${editing ? '确认保存' : null}">
                        <input type="hidden" name="id" th:value="${resident.id}" />

                        <label>
                            所属房屋
                            <div class="custom-select" data-required>
                                <input type="hidden" name="unitId" th:value="${resident.unitId}" required />
                                <button type="button" class="custom-select-trigger" aria-expanded="false">
                                    <span class="custom-select-trigger-text">请选择房屋</span>
                                    <span class="custom-select-arrow" aria-hidden="true"></span>
                                </button>
                                <ul class="custom-select-panel">
                                    <li class="custom-select-option" data-value="" data-label="请选择房屋"
                                        th:classappend="${resident.unitId == null} ? ' is-selected'">请选择房屋</li>
                                    <li th:each="unit : ${units}"
                                        class="custom-select-option"
                                        th:attr="data-value=${unit.id},data-label=${unit.unitNo}"
                                        th:classappend="${resident.unitId == unit.id} ? ' is-selected'"
                                        th:text="${unit.unitNo}"></li>
                                </ul>
                            </div>
                        </label>

                        <label>
                            姓名
                            <input name="name" th:value="${resident.name}" required />
                        </label>

                        <label>
                            手机号
                            <input name="phone" th:value="${resident.phone}" />
                        </label>

                        <label>
                            证件号
                            <input name="identityNo" th:value="${resident.identityNo}" />
                        </label>

                        <label>
                            入住日期
                            <input type="date" name="moveInDate" th:value="${resident.moveInDate}" data-ui-picker="date" />
                        </label>

                        <label>
                            迁出日期
                            <input type="date" name="moveOutDate" th:value="${resident.moveOutDate}" data-ui-picker="date" />
                        </label>

                        <label>
                            住户类型
                            <div class="custom-select">
                                <input type="hidden" name="residentType"
                                       th:value="${resident.residentType != null ? resident.residentType : 'OWNER'}" />
                                <button type="button" class="custom-select-trigger" aria-expanded="false">
                                    <span class="custom-select-trigger-text"
                                          th:text="${resident.residentType == 'TENANT'} ? '租户' : (${resident.residentType == 'FAMILY'} ? '家属' : '业主')">业主</span>
                                    <span class="custom-select-arrow" aria-hidden="true"></span>
                                </button>
                                <ul class="custom-select-panel">
                                    <li class="custom-select-option" data-value="OWNER" data-label="业主"
                                        th:classappend="${resident.residentType == null or resident.residentType == 'OWNER'} ? ' is-selected'">业主</li>
                                    <li class="custom-select-option" data-value="TENANT" data-label="租户"
                                        th:classappend="${resident.residentType == 'TENANT'} ? ' is-selected'">租户</li>
                                    <li class="custom-select-option" data-value="FAMILY" data-label="家属"
                                        th:classappend="${resident.residentType == 'FAMILY'} ? ' is-selected'">家属</li>
                                </ul>
                            </div>
                        </label>

                        <label>
                            状态
                            <div class="custom-select">
                                <input type="hidden" name="status"
                                       th:value="${resident.status != null ? resident.status : 'ACTIVE'}" />
                                <button type="button" class="custom-select-trigger" aria-expanded="false">
                                    <span class="custom-select-trigger-text"
                                          th:text="${resident.status == 'MOVED_OUT'} ? '已迁出' : '在住'">在住</span>
                                    <span class="custom-select-arrow" aria-hidden="true"></span>
                                </button>
                                <ul class="custom-select-panel">
                                    <li class="custom-select-option" data-value="ACTIVE" data-label="在住"
                                        th:classappend="${resident.status == null or resident.status == 'ACTIVE'} ? ' is-selected'">在住
                                        <span class="custom-select-option-badge" data-tone="success">正常</span></li>
                                    <li class="custom-select-option" data-value="MOVED_OUT" data-label="已迁出"
                                        th:classappend="${resident.status == 'MOVED_OUT'} ? ' is-selected'">已迁出
                                        <span class="custom-select-option-badge" data-tone="warning">已结束</span></li>
                                </ul>
                            </div>
                        </label>


                        <div class="form-actions">
                            <button class="btn primary" type="submit">保存</button>
                            <a class="btn ghost" href="/admin/residents">取消</a>
                        </div>
                    </form>

                    <section class="embedded-danger-panel" th:if="${editing and resident.id != null}">
                        <div class="embedded-danger-copy">
                            <span class="note-kicker">危险操作</span>
                            <h3>删除当前住户档案</h3>
                            <p>删除后不可恢复。若该住户仍关联账单、工单或房屋在住信息，请先处理关联数据后再删除。</p>
                        </div>
                        <form th:action="@{'/admin/residents/delete/' + ${resident.id}}"
                              method="post"
                              class="embedded-danger-actions"
                              data-confirm-message="确认删除该住户吗？删除后将无法恢复"
                              data-confirm-confirm-text="确认删除"
                              data-confirm-tone="danger">
                            <button class="btn danger" type="submit">删除住户档案</button>
                        </form>
                    </section>
                </section>
            </div>

            <aside class="form-aside">
                <section class="form-note-card">
                    <span class="note-kicker">档案联动</span>
                    <h3>住户资料将同步影响多个模块</h3>
                    <p>住户姓名、手机号与所属房屋会在工单中心和住户查询中直接展示，建议优先保证基础资料准确。</p>
                </section>
                <section class="form-note-card">
                    <h3>录入提醒</h3>
                    <ul>
                        <li>入住日期建议与实际交付时间保持一致。</li>
                        <li>若已迁出，请补充迁出日期并更新状态。</li>
                        <li>证件号与手机号建议完整录入，便于后续核验。</li>
                    </ul>
                </section>
            </aside>
        </section>
    </main>
</div>
<div th:replace="~{fragments/layout :: confirmModal}"></div>
</body>
</html>
