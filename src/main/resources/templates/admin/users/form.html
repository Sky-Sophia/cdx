<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${editing} ? '编辑用户' : '新增用户'">系统用户表单</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="stylesheet" href="/css/apps/admin.css" />
    <link rel="stylesheet" href="/css/apps/admin-archive-create.css" th:href="@{/css/apps/admin-archive-create.css}" />
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/layout :: topbar('users')}"></div>
    <div th:replace="~{fragments/layout :: sidebar('users')}"></div>

    <main class="app-main">
        <div th:replace="~{fragments/layout :: messages}"></div>

        <section class="archive-create-page archive-create-page--user" th:unless="${editing}">
            <form method="post" action="/admin/users/save" class="archive-create-form">
                <div class="archive-create-card">
                    <div class="archive-top-bar"></div>
                    <div class="archive-create-header">
                        <div class="archive-create-sn">账号编号：__________</div>
                        <div class="archive-create-stamp"><span>系统<br />用户</span></div>
                        <h1>系统用户档案</h1>
                        <p class="subtitle">USER PROFILE</p>
                    </div>

                    <div class="archive-create-body">
                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label" for="managed-username">登录账号</label>
                                <input class="archive-create-control" id="managed-username" name="username" type="text"
                                       th:value="${managedUser.username}" placeholder="请设置登录账号" required />
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label" for="managed-password">登录密码</label>
                                <input class="archive-create-control" id="managed-password" name="password" type="password"
                                       placeholder="请设置登录密码" required />
                            </div>
                        </div>

                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label" id="managed-role-label">权限角色</label>
                                <div class="custom-select archive-create-control">
                                    <input type="hidden" name="role"
                                           th:value="${managedUser.role != null ? managedUser.role.name() : 'ADMIN'}" />
                                    <button type="button" class="custom-select-trigger" aria-expanded="false"
                                            aria-labelledby="managed-role-label managed-role-trigger-text">
                                        <span class="custom-select-trigger-text" id="managed-role-trigger-text"
                                              th:text="${managedUser.role != null ? managedUser.role.label : '系统管理员'}">系统管理员</span>
                                        <span class="custom-select-arrow" aria-hidden="true"></span>
                                    </button>
                                    <ul class="custom-select-panel">
                                        <li th:if="${roles != null}" th:each="item : ${roles}"
                                            class="custom-select-option"
                                            th:attr="data-value=${item.name()},data-label=${item.label}"
                                            th:classappend="${managedUser.role == null ? item.name() == 'ADMIN' : managedUser.role == item} ? ' is-selected'"
                                            th:text="${item.label}"></li>
                                    </ul>
                                </div>
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label" id="managed-status-create-label">账号状态</label>
                                <div class="custom-select archive-create-control">
                                    <input type="hidden" name="status" th:value="${managedUser.status != null ? managedUser.status : 'ACTIVE'}" />
                                    <button type="button" class="custom-select-trigger" aria-expanded="false"
                                            aria-labelledby="managed-status-create-label managed-status-create-trigger-text">
                                        <span class="custom-select-trigger-text" id="managed-status-create-trigger-text"
                                              th:text="${managedUser.status == 'DISABLED' ? '禁用' : '启用'}">启用</span>
                                        <span class="custom-select-arrow" aria-hidden="true"></span>
                                    </button>
                                    <ul class="custom-select-panel">
                                        <li class="custom-select-option" data-value="ACTIVE" data-label="启用"
                                            th:classappend="${managedUser.status == null or managedUser.status == 'ACTIVE'} ? ' is-selected'">启用</li>
                                        <li class="custom-select-option" data-value="DISABLED" data-label="禁用"
                                            th:classappend="${managedUser.status == 'DISABLED'} ? ' is-selected'">禁用</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="archive-create-footer">
                        <span class="archive-create-time"
                              th:text="${'登记日期 ' + #temporals.format(#temporals.createNow(), 'yyyy年M月d日')}">登记日期 ——</span>
                        <div class="archive-create-actions">
                            <a class="archive-create-action archive-create-action--cancel" href="/admin/users">取　消</a>
                            <button class="archive-create-action archive-create-action--save" type="submit">保　存</button>
                        </div>
                    </div>
                </div>
            </form>
        </section>

        <section class="archive-create-page archive-create-page--user" th:if="${editing}">
            <form th:action="@{/admin/users/{id}/manage(id=${managedUser.id})}" method="post" class="archive-create-form"
                  data-confirm-message="确认保存对该用户的设置修改吗？"
                  data-confirm-confirm-text="确认保存">
                <div class="archive-create-card">
                    <div class="archive-top-bar"></div>
                    <div class="archive-create-header">
                        <div class="archive-create-sn"
                             th:text="${managedUser.id != null ? '账号编号：' + managedUser.id : '账号编号：待生成'}">账号编号：__________</div>
                        <div class="archive-create-stamp"><span>系统<br />用户</span></div>
                        <h1>系统用户档案</h1>
                        <p class="subtitle">USER PROFILE</p>
                    </div>

                    <div class="archive-create-body">
                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label" for="managed-username-edit">登录账号</label>
                                <input class="archive-create-control" id="managed-username-edit" th:value="${managedUser.username}" readonly />
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label" id="managed-status-label">账号状态</label>
                                <div class="custom-select archive-create-control">
                                    <input type="hidden" name="status" th:value="${managedUser.status != null ? managedUser.status : 'ACTIVE'}" />
                                    <button type="button" class="custom-select-trigger" aria-expanded="false"
                                            aria-labelledby="managed-status-label managed-status-trigger-text">
                                        <span class="custom-select-trigger-text" id="managed-status-trigger-text"
                                              th:text="${managedUser.status == 'DISABLED'} ? '禁用' : '启用'">启用</span>
                                        <span class="custom-select-arrow" aria-hidden="true"></span>
                                    </button>
                                    <ul class="custom-select-panel">
                                        <li class="custom-select-option" data-value="ACTIVE" data-label="启用"
                                            th:classappend="${managedUser.status == null or managedUser.status == 'ACTIVE'} ? ' is-selected'">启用</li>
                                        <li class="custom-select-option" data-value="DISABLED" data-label="禁用"
                                            th:classappend="${managedUser.status == 'DISABLED'} ? ' is-selected'">禁用</li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label" id="managed-role-edit-label">权限角色</label>
                                <div class="custom-select archive-create-control">
                                    <input type="hidden" id="managed-role-edit" name="role"
                                           th:value="${managedUser.role != null ? managedUser.role.name() : 'ADMIN'}" />
                                    <button type="button" class="custom-select-trigger" aria-expanded="false"
                                            aria-labelledby="managed-role-edit-label managed-role-edit-trigger-text">
                                        <span class="custom-select-trigger-text" id="managed-role-edit-trigger-text"
                                              th:text="${managedUser.role != null ? managedUser.role.label : '系统管理员'}">系统管理员</span>
                                        <span class="custom-select-arrow" aria-hidden="true"></span>
                                    </button>
                                    <ul class="custom-select-panel">
                                        <li th:if="${roles != null}" th:each="item : ${roles}"
                                            class="custom-select-option"
                                            th:attr="data-value=${item.name()},data-label=${item.label}"
                                            th:classappend="${managedUser.role == null ? item.name() == 'ADMIN' : managedUser.role == item} ? ' is-selected'"
                                            th:text="${item.label}"></li>
                                    </ul>
                                </div>
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label" for="managed-createdAt">创建时间</label>
                                <input class="archive-create-control" id="managed-createdAt"
                                       th:value="${managedUser.createdAt != null ? #temporals.format(managedUser.createdAt, 'yyyy-MM-dd HH:mm') : '暂无记录'}"
                                       readonly />
                            </div>
                        </div>

                        <div class="archive-create-row-single">
                            <label class="archive-create-label" for="managed-updatedAt">最近更新</label>
                            <input class="archive-create-control" id="managed-updatedAt"
                                   th:value="${managedUser.updatedAt != null ? #temporals.format(managedUser.updatedAt, 'yyyy-MM-dd HH:mm') : '暂无更新'}"
                                   readonly />
                        </div>
                    </div>

                    <div class="archive-create-footer">
                        <span class="archive-create-time"
                              th:text="${managedUser.updatedAt != null ? '最近更新 ' + #temporals.format(managedUser.updatedAt, 'yyyy年M月d日') : '登记日期 ' + #temporals.format(#temporals.createNow(), 'yyyy年M月d日')}">登记日期 ——</span>
                        <div class="archive-create-actions">
                            <a class="archive-create-action archive-create-action--cancel" href="/admin/users">取　消</a>
                            <button class="archive-create-action archive-create-action--save" type="submit">保存设置</button>
                        </div>
                    </div>
                </div>
            </form>

            <section class="embedded-support-panel" th:if="${managedUser.id != null}">
                <div class="embedded-support-copy">
                    <span class="note-kicker">密码维护</span>
                    <h3>重置当前账号密码</h3>
                    <p>如不填写新密码，系统将重置为默认密码 <strong>Property@123</strong>。建议只在确有需要时执行。</p>
                </div>
                <form th:action="@{/admin/users/{id}/reset-password(id=${managedUser.id})}"
                      method="post"
                      class="embedded-support-actions"
                      data-confirm-message="确认重置该用户密码吗？"
                      data-confirm-confirm-text="确认重置">
                    <label>
                        新密码（可选）
                        <input name="newPassword" type="password" placeholder="留空则重置为默认密码" />
                    </label>
                    <button class="btn" type="submit">重置密码</button>
                </form>
            </section>
        </section>
    </main>
</div>
<div th:replace="~{fragments/layout :: confirmModal}"></div>
</body>
</html>
