<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>系统用户 - 物业后台管理系统</title>
    <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments :: topbar('users')}"></div>
    <div th:replace="~{fragments :: sidebar('users')}"></div>

    <main class="app-main">
        <div th:replace="~{fragments :: messages}"></div>

        <section class="page-head compact">
            <h1>系统用户与权限</h1>
            <a class="btn primary" href="/admin/users/new">新增用户</a>
        </section>

        <section class="panel">
            <form method="get" action="/admin/users" class="filter-row">
                <input name="q" placeholder="用户名" th:value="${q}" />
                <select name="role">
                    <option value="">全部角色</option>
                    <option th:each="item : ${roles}" th:value="${item}" th:text="${item.label}" th:selected="${role == item}"></option>
                </select>
                <select name="status">
                    <option value="">全部状态</option>
                    <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">启用</option>
                    <option value="DISABLED" th:selected="${status == 'DISABLED'}">禁用</option>
                </select>
                <button class="btn" type="submit">筛选</button>
            </form>

            <div class="table-wrap">
                <table class="table">
                    <thead>
                    <tr>
                        <th>用户名</th>
                        <th>角色</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th class="align-right">操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="5" class="empty">暂无用户数据。</td>
                    </tr>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.username}"></td>
                        <td><span class="badge" th:attr="data-status=${user.role}" th:text="${user.role.label}"></span></td>
                        <td><span class="badge" th:attr="data-status=${user.status}" th:text="${user.status == 'ACTIVE' ? '启用' : '禁用'}"></span></td>
                        <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                        <td class="align-right actions">
                            <form th:action="@{'/admin/users/' + ${user.id} + '/status'}" method="post">
                                <input type="hidden" name="status" th:value="${user.status == 'ACTIVE' ? 'DISABLED' : 'ACTIVE'}" />
                                <button class="btn ghost mini" type="submit" th:text="${user.status == 'ACTIVE' ? '禁用' : '启用'}"></button>
                            </form>
                            <form th:action="@{'/admin/users/' + ${user.id} + '/reset-password'}" method="post">
                                <input name="newPassword" placeholder="可选：输入新密码" />
                                <button class="btn mini" type="submit">重置密码</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>
</body>
</html>
