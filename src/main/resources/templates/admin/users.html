<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>用户管理</title>
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260321a" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico?v=20260321a" />
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="stack-lg">
    <section class="page-header">
        <div>
            <p class="page-kicker">Admin</p>
            <h1 class="page-title">用户管理</h1>
            <p class="page-subtitle">按角色和状态筛选用户，并执行状态与密码维护。</p>
        </div>
    </section>

    <div th:replace="~{fragments :: messages}"></div>

    <div class="card">
        <div class="card-head">
            <h2>用户统计</h2>
            <span class="muted">重置密码默认 123456</span>
        </div>
        <div class="stat-grid">
            <div class="stat-mini">
                <div class="stat-label">总用户</div>
                <div class="stat-value" th:text="${totalUsers}">0</div>
            </div>
            <div class="stat-mini">
                <div class="stat-label">启用</div>
                <div class="stat-value" th:text="${activeUsers}">0</div>
            </div>
            <div class="stat-mini">
                <div class="stat-label">停用</div>
                <div class="stat-value" th:text="${disabledUsers}">0</div>
            </div>
        </div>
        <form class="form-inline" method="get" action="/admin/users">
            <div class="form-row">
                <label>搜索</label>
                <input name="q" placeholder="用户名" th:value="${q}" />
            </div>
            <div class="form-row">
                <label>角色</label>
                <select name="role">
                    <option value="">全部</option>
                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r.label}" th:selected="${role == r}"></option>
                </select>
            </div>
            <div class="form-row">
                <label>状态</label>
                <select name="status">
                    <option value="">全部</option>
                    <option value="ACTIVE" th:selected="${status == 'ACTIVE'}">启用</option>
                    <option value="DISABLED" th:selected="${status == 'DISABLED'}">停用</option>
                </select>
            </div>
            <div class="form-actions">
                <button class="btn" type="submit">筛选</button>
                <a class="btn" href="/admin/users">重置</a>
            </div>
        </form>
    </div>

    <div class="card">
        <div class="card-head">
            <h2>用户列表</h2>
            <span class="badge" th:text="${#lists.size(users)} + ' 人'">0 人</span>
        </div>
        <div th:if="${#lists.isEmpty(users)}" class="empty-state">暂无符合条件的用户。</div>
        <div class="table-wrap" th:if="${!#lists.isEmpty(users)}">
            <table class="table">
                <thead>
                <tr>
                    <th>用户名</th>
                    <th>角色</th>
                    <th>状态</th>
                    <th>创建时间</th>
                    <th class="table-actions">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.username}"></td>
                    <td><span class="badge" th:text="${user.role.label}" th:attr="data-role=${user.role.name()}"></span></td>
                    <td><span class="badge" th:text="${user.status == 'ACTIVE' ? '启用' : '停用'}" th:attr="data-status=${user.status}"></span></td>
                    <td th:text="${user.createdAt}"></td>
                    <td class="table-actions">
                        <div class="btn-group">
                            <form class="inline-form" method="post" th:action="@{'/admin/users/' + ${user.id} + '/update'}">
                                <select name="role" class="input-sm">
                                    <option th:each="r : ${roles}" th:value="${r}" th:text="${r.label}" th:selected="${user.role == r}"></option>
                                </select>
                                <select name="status" class="input-sm">
                                    <option value="ACTIVE" th:selected="${user.status == 'ACTIVE'}">启用</option>
                                    <option value="DISABLED" th:selected="${user.status == 'DISABLED'}">停用</option>
                                </select>
                                <button class="btn" type="submit">更新</button>
                            </form>
                            <form class="inline-form" method="post" th:action="@{'/admin/users/' + ${user.id} + '/reset-password'}">
                                <input type="hidden" name="newPassword" value="123456" />
                                <button class="btn danger" type="submit">重置密码</button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
