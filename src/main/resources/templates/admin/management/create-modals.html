<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<body>
<th:block th:fragment="createModals">
<div class="management-create-modal-overlay"
     data-management-create-modal="residents"
     th:attr="data-open-on-load=${openCreateResidentModal ? 'true' : null}"
     hidden
     aria-hidden="true">
    <div class="management-create-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="residentCreateModalTitle">
        <div class="management-create-modal-shell">
            <button class="management-create-modal-close" type="button" data-management-create-close aria-label="关闭新增住户弹窗">×</button>
            <form method="post" action="/admin/residents/save" class="archive-create-form management-create-modal-form">
                <div class="archive-create-card">
                    <div class="archive-top-bar"></div>
                    <div th:replace="~{fragments/admin-archive :: archiveHeaderWithId(
                            ${'住户编号：'},
                            ${'住户<br />档案'},
                            ${'住户档案登记表'},
                            ${'residentCreateModalTitle'},
                            ${'RESIDENT RECORD REGISTRATION'})}"></div>

                    <div class="archive-create-body"
                         th:with="selectedResidentType=${createResident.residentType != null ? createResident.residentType : 'OWNER'},
                                  selectedResidentStatus=${createResident.status != null ? createResident.status : 'ACTIVE'}">
                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label" id="managed-resident-unit-label">所属房屋</label>
                                <div class="unit-picker archive-create-control" data-unit-picker data-required>
                                    <input type="hidden" name="unitId" th:value="${createResident.unitId}" required data-unit-picker-value />
                                    <input class="archive-create-control unit-picker-input"
                                           id="managed-resident-unit-input"
                                           type="text"
                                           placeholder="点击选择房屋"
                                           readonly
                                           data-unit-picker-input
                                           aria-labelledby="managed-resident-unit-label" />
                                    <button class="unit-picker-open" type="button" data-unit-picker-trigger aria-label="选择房屋">选择</button>
                                    <div class="unit-picker-panel" data-unit-picker-panel hidden>
                                        <div class="unit-picker-column">
                                            <div class="unit-picker-title">栋</div>
                                            <div class="unit-picker-list" data-unit-picker-buildings></div>
                                        </div>
                                        <div class="unit-picker-column">
                                            <div class="unit-picker-title">单元</div>
                                            <div class="unit-picker-list" data-unit-picker-units></div>
                                        </div>
                                        <div class="unit-picker-column unit-picker-column--rooms">
                                            <div class="unit-picker-title">户</div>
                                            <div class="unit-picker-list" data-unit-picker-rooms></div>
                                        </div>
                                    </div>
                                    <ul class="unit-picker-data" hidden>
                                        <li th:each="unit : ${unitOptions}"
                                            data-unit-picker-option
                                            th:attr="data-id=${unit.id},data-unit-no=${unit.unitNo}"></li>
                                    </ul>
                                </div>
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label" for="managed-resident-name">姓名</label>
                                <input class="archive-create-control"
                                       id="managed-resident-name"
                                       name="name"
                                       type="text"
                                       th:value="${createResident.name}"
                                       placeholder="请输入住户姓名"
                                       data-management-create-autofocus
                                       required />
                            </div>
                        </div>

                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label" for="managed-resident-phone">手机号</label>
                                <input class="archive-create-control"
                                       id="managed-resident-phone"
                                       name="phone"
                                       type="text"
                                       th:value="${createResident.phone}"
                                       placeholder="请输入联系电话" />
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label" for="managed-resident-identityNo">证件号码</label>
                                <input class="archive-create-control"
                                       id="managed-resident-identityNo"
                                       name="identityNo"
                                       type="text"
                                       th:value="${createResident.identityNo}"
                                       placeholder="请输入证件号码" />
                            </div>
                        </div>

                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label" for="managed-resident-moveInDate">入住日期</label>
                                <input class="archive-create-control"
                                       id="managed-resident-moveInDate"
                                       type="date"
                                       name="moveInDate"
                                       th:value="${createResident.moveInDate}"
                                       data-ui-picker="date" />
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label" for="managed-resident-moveOutDate">迁出日期</label>
                                <input class="archive-create-control"
                                       id="managed-resident-moveOutDate"
                                       type="date"
                                       name="moveOutDate"
                                       th:value="${createResident.moveOutDate}"
                                       data-ui-picker="date" />
                            </div>
                        </div>

                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label" id="managed-resident-type-label">住户类型</label>
                                <div class="custom-select archive-create-control" data-required>
                                    <input type="hidden" name="residentType" th:value="${selectedResidentType}" required />
                                    <button type="button" class="custom-select-trigger" aria-expanded="false"
                                            aria-labelledby="managed-resident-type-label managed-resident-type-trigger-text">
                                        <span class="custom-select-trigger-text" id="managed-resident-type-trigger-text"
                                              th:text="${selectedResidentType == 'TENANT' ? '租客' : '业主'}">业主</span>
                                        <span class="custom-select-arrow" aria-hidden="true"></span>
                                    </button>
                                    <ul class="custom-select-panel">
                                        <li class="custom-select-option" data-value="OWNER" data-label="业主"
                                            th:classappend="${selectedResidentType == 'OWNER' ? ' is-selected' : ''}">业主</li>
                                        <li class="custom-select-option" data-value="TENANT" data-label="租客"
                                            th:classappend="${selectedResidentType == 'TENANT' ? ' is-selected' : ''}">租客</li>
                                    </ul>
                                </div>
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label" id="managed-resident-status-label">当前状态</label>
                                <div class="custom-select archive-create-control">
                                    <input type="hidden" name="status" th:value="${selectedResidentStatus}" />
                                    <button type="button" class="custom-select-trigger" aria-expanded="false"
                                            aria-labelledby="managed-resident-status-label managed-resident-status-trigger-text">
                                        <span class="custom-select-trigger-text" id="managed-resident-status-trigger-text"
                                              th:text="${selectedResidentStatus == 'MOVED_OUT' ? '已迁出' : '在住'}">在住</span>
                                        <span class="custom-select-arrow" aria-hidden="true"></span>
                                    </button>
                                    <ul class="custom-select-panel">
                                        <li class="custom-select-option" data-value="ACTIVE" data-label="在住"
                                            th:classappend="${selectedResidentStatus == 'ACTIVE' ? ' is-selected' : ''}">在住</li>
                                        <li class="custom-select-option" data-value="MOVED_OUT" data-label="已迁出"
                                            th:classappend="${selectedResidentStatus == 'MOVED_OUT' ? ' is-selected' : ''}">已迁出</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div th:replace="~{fragments/admin-archive :: archiveModalFooter(
                            ${'登记日期 ' + #temporals.format(#temporals.createNow(), 'yyyy年M月d日')},
                            ${'取消'},
                            ${'保存归档'})}"></div>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="management-create-modal-overlay"
     data-management-create-modal="work-orders"
     th:attr="data-open-on-load=${openCreateWorkOrderModal ? 'true' : null}"
     hidden
     aria-hidden="true">
    <div class="management-create-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="workOrderCreateModalTitle">
        <div class="management-create-modal-shell">
            <button class="management-create-modal-close" type="button" data-management-create-close aria-label="关闭新增工单弹窗">×</button>
            <form method="post" action="/admin/work-orders/save" class="archive-create-form management-create-modal-form">
                <div class="archive-create-card">
                    <div class="archive-top-bar"></div>
                    <div th:replace="~{fragments/admin-archive :: archiveHeaderWithId(
                            ${'工单编号：待生成'},
                            ${'报修<br />工单'},
                            ${'报修工单登记表'},
                            ${'workOrderCreateModalTitle'},
                            ${'WORK ORDER REGISTRATION'})}"></div>

                    <div class="archive-create-body"
                         th:with="selectedCategory=${createWorkOrder.category != null and createWorkOrder.category != '' ? createWorkOrder.category : '水电维修'},
                                  selectedPriority=${createWorkOrder.priority != null ? createWorkOrder.priority : 'MEDIUM'}">
                        <input type="hidden" name="status" th:value="${createWorkOrder.status != null ? createWorkOrder.status : 'OPEN'}" />
                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label" id="managed-work-order-unit-label">报修房屋</label>
                                <div class="unit-picker archive-create-control" data-unit-picker data-required>
                                    <input type="hidden" name="unitId" th:value="${createWorkOrder.unitId}" required data-unit-picker-value />
                                    <input class="archive-create-control unit-picker-input"
                                           id="managed-work-order-unit-input"
                                           type="text"
                                           placeholder="点击选择房屋"
                                           readonly
                                           data-unit-picker-input
                                           aria-labelledby="managed-work-order-unit-label" />
                                    <button class="unit-picker-open" type="button" data-unit-picker-trigger aria-label="选择房屋">选择</button>
                                    <div class="unit-picker-panel" data-unit-picker-panel hidden>
                                        <div class="unit-picker-column">
                                            <div class="unit-picker-title">栋</div>
                                            <div class="unit-picker-list" data-unit-picker-buildings></div>
                                        </div>
                                        <div class="unit-picker-column">
                                            <div class="unit-picker-title">单元</div>
                                            <div class="unit-picker-list" data-unit-picker-units></div>
                                        </div>
                                        <div class="unit-picker-column unit-picker-column--rooms">
                                            <div class="unit-picker-title">户</div>
                                            <div class="unit-picker-list" data-unit-picker-rooms></div>
                                        </div>
                                    </div>
                                    <ul class="unit-picker-data" hidden>
                                        <li th:each="unit : ${unitOptions}"
                                            data-unit-picker-option
                                            th:attr="data-id=${unit.id},data-unit-no=${unit.unitNo}"></li>
                                    </ul>
                                </div>
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label">报修人</label>
                                <input class="archive-create-control archive-create-control--readonly" type="text" value="系统将按房屋自动关联当前在住住户" readonly />
                            </div>
                        </div>

                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label">联系电话</label>
                                <input class="archive-create-control archive-create-control--readonly" type="text" value="联系电话将随住户档案自动带出" readonly />
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label" id="managed-work-order-category-label">工单类别</label>
                                <div class="custom-select archive-create-control">
                                    <input type="hidden" name="category" th:value="${selectedCategory}" />
                                    <button type="button" class="custom-select-trigger" aria-expanded="false"
                                            aria-labelledby="managed-work-order-category-label managed-work-order-category-trigger-text">
                                        <span class="custom-select-trigger-text" id="managed-work-order-category-trigger-text"
                                              th:text="${selectedCategory}">水电维修</span>
                                        <span class="custom-select-arrow" aria-hidden="true"></span>
                                    </button>
                                    <ul class="custom-select-panel">
                                        <li class="custom-select-option" data-value="水电维修" data-label="水电维修"
                                            th:classappend="${selectedCategory == '水电维修' ? ' is-selected' : ''}">水电维修</li>
                                        <li class="custom-select-option" data-value="门禁设备" data-label="门禁设备"
                                            th:classappend="${selectedCategory == '门禁设备' ? ' is-selected' : ''}">门禁设备</li>
                                        <li class="custom-select-option" data-value="公共区域环境" data-label="公共区域环境"
                                            th:classappend="${selectedCategory == '公共区域环境' ? ' is-selected' : ''}">公共区域环境</li>
                                        <li class="custom-select-option" data-value="其他" data-label="其他"
                                            th:classappend="${selectedCategory == '其他' ? ' is-selected' : ''}">其他</li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label" id="managed-work-order-priority-label">优先级</label>
                                <div class="custom-select archive-create-control">
                                    <input type="hidden" name="priority" th:value="${selectedPriority}" />
                                    <button type="button" class="custom-select-trigger" aria-expanded="false"
                                            aria-labelledby="managed-work-order-priority-label managed-work-order-priority-trigger-text">
                                        <span class="custom-select-trigger-text" id="managed-work-order-priority-trigger-text"
                                              th:text="${selectedPriority == 'HIGH' ? '高' : (selectedPriority == 'LOW' ? '低' : '中')}">中</span>
                                        <span class="custom-select-arrow" aria-hidden="true"></span>
                                    </button>
                                    <ul class="custom-select-panel">
                                        <li class="custom-select-option" data-value="HIGH" data-label="高"
                                            th:classappend="${selectedPriority == 'HIGH' ? ' is-selected' : ''}">高</li>
                                        <li class="custom-select-option" data-value="MEDIUM" data-label="中"
                                            th:classappend="${selectedPriority == 'MEDIUM' ? ' is-selected' : ''}">中</li>
                                        <li class="custom-select-option" data-value="LOW" data-label="低"
                                            th:classappend="${selectedPriority == 'LOW' ? ' is-selected' : ''}">低</li>
                                    </ul>
                                </div>
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label">处理人员</label>
                                <input class="archive-create-control archive-create-control--readonly"
                                       type="text"
                                       value="工单开始处理后自动关联当前员工"
                                       readonly />
                            </div>
                        </div>

                        <div class="archive-create-row-single is-textarea">
                            <label class="archive-create-label" for="managed-work-order-description">问题描述</label>
                            <textarea class="archive-create-control"
                                      id="managed-work-order-description"
                                      name="description"
                                      rows="4"
                                      placeholder="请填写报修详情"
                                      data-management-create-autofocus
                                      th:text="${createWorkOrder.description}"
                                      required></textarea>
                        </div>
                    </div>

                    <div th:replace="~{fragments/admin-archive :: archiveModalFooter(
                            ${'登记日期 ' + #temporals.format(#temporals.createNow(), 'yyyy年M月d日')},
                            ${'取消'},
                            ${'创建工单'})}"></div>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="management-create-modal-overlay"
     data-management-create-modal="bills"
     th:attr="data-open-on-load=${openCreateBillModal ? 'true' : null}"
     hidden
     aria-hidden="true">
    <div class="management-create-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="billCreateModalTitle">
        <div class="management-create-modal-shell">
            <button class="management-create-modal-close" type="button" data-management-create-close aria-label="关闭新增账单弹窗">×</button>
            <form method="post" action="/admin/bills/save" class="archive-create-form management-create-modal-form">
                <div class="archive-create-card">
                    <div class="archive-top-bar"></div>
                    <div th:replace="~{fragments/admin-archive :: archiveHeaderWithId(
                            ${'账单编号：待生成'},
                            ${'费用<br />账单'},
                            ${'费用账单登记表'},
                            ${'billCreateModalTitle'},
                            ${'FEE BILL REGISTRATION'})}"></div>

                    <div class="archive-create-body"
                         th:with="selectedBillStatus=${createBill.status != null ? createBill.status : 'UNPAID'}">
                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label" id="managed-bill-unit-label">房屋</label>
                                <div class="unit-picker archive-create-control" data-unit-picker data-required>
                                    <input type="hidden" name="unitId" th:value="${createBill.unitId}" required data-unit-picker-value />
                                    <input class="archive-create-control unit-picker-input"
                                           id="managed-bill-unit-input"
                                           type="text"
                                           placeholder="点击选择房屋"
                                           readonly
                                           data-unit-picker-input
                                           aria-labelledby="managed-bill-unit-label" />
                                    <button class="unit-picker-open" type="button" data-unit-picker-trigger aria-label="选择房屋">选择</button>
                                    <div class="unit-picker-panel" data-unit-picker-panel hidden>
                                        <div class="unit-picker-column">
                                            <div class="unit-picker-title">栋</div>
                                            <div class="unit-picker-list" data-unit-picker-buildings></div>
                                        </div>
                                        <div class="unit-picker-column">
                                            <div class="unit-picker-title">单元</div>
                                            <div class="unit-picker-list" data-unit-picker-units></div>
                                        </div>
                                        <div class="unit-picker-column unit-picker-column--rooms">
                                            <div class="unit-picker-title">户</div>
                                            <div class="unit-picker-list" data-unit-picker-rooms></div>
                                        </div>
                                    </div>
                                    <ul class="unit-picker-data" hidden>
                                        <li th:each="unit : ${unitOptions}"
                                            data-unit-picker-option
                                            th:attr="data-id=${unit.id},data-unit-no=${unit.unitNo}"></li>
                                    </ul>
                                </div>
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label" for="managed-bill-billingMonth">账期</label>
                                <input class="archive-create-control"
                                       id="managed-bill-billingMonth"
                                       type="month"
                                       name="billingMonth"
                                       th:value="${createBill.billingMonth}"
                                       data-ui-picker="month"
                                       data-management-create-autofocus
                                       required />
                            </div>
                        </div>

                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label" for="managed-bill-amount">应收金额</label>
                                <input class="archive-create-control"
                                       id="managed-bill-amount"
                                       type="number"
                                       name="amount"
                                       th:value="${createBill.amount}"
                                       step="0.01"
                                       min="0"
                                       placeholder="请输入金额"
                                       required />
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label" id="managed-bill-status-label">账单状态</label>
                                <div class="custom-select archive-create-control">
                                    <input type="hidden" name="status" th:value="${selectedBillStatus}" />
                                    <button type="button" class="custom-select-trigger" aria-expanded="false"
                                            aria-labelledby="managed-bill-status-label managed-bill-status-trigger-text">
                                        <span class="custom-select-trigger-text" id="managed-bill-status-trigger-text"
                                              th:text="${selectedBillStatus == 'PARTIAL' ? '部分已缴' : (selectedBillStatus == 'OVERDUE' ? '逾期' : (selectedBillStatus == 'PAID' ? '已缴清' : '未缴'))}">未缴</span>
                                        <span class="custom-select-arrow" aria-hidden="true"></span>
                                    </button>
                                    <ul class="custom-select-panel">
                                        <li class="custom-select-option" data-value="UNPAID" data-label="未缴"
                                            th:classappend="${selectedBillStatus == 'UNPAID' ? ' is-selected' : ''}">未缴</li>
                                        <li class="custom-select-option" data-value="PARTIAL" data-label="部分已缴"
                                            th:classappend="${selectedBillStatus == 'PARTIAL' ? ' is-selected' : ''}">部分已缴</li>
                                        <li class="custom-select-option" data-value="OVERDUE" data-label="逾期"
                                            th:classappend="${selectedBillStatus == 'OVERDUE' ? ' is-selected' : ''}">逾期</li>
                                        <li class="custom-select-option" data-value="PAID" data-label="已缴清"
                                            th:classappend="${selectedBillStatus == 'PAID' ? ' is-selected' : ''}">已缴清</li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label" for="managed-bill-paidAmount">实收金额</label>
                                <input class="archive-create-control"
                                       id="managed-bill-paidAmount"
                                       type="number"
                                       name="paidAmount"
                                       th:value="${createBill.paidAmount}"
                                       step="0.01"
                                       min="0"
                                       placeholder="请输入金额" />
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label" for="managed-bill-dueDate">到期日期</label>
                                <input class="archive-create-control"
                                       id="managed-bill-dueDate"
                                       type="date"
                                       name="dueDate"
                                       th:value="${createBill.dueDate}"
                                       data-ui-picker="date" />
                            </div>
                        </div>

                        <div class="archive-create-row-single is-textarea">
                            <label class="archive-create-label" for="managed-bill-remarks">备注</label>
                            <textarea class="archive-create-control"
                                      id="managed-bill-remarks"
                                      name="remarks"
                                      rows="3"
                                      placeholder="请输入备注信息"
                                      th:text="${createBill.remarks}"></textarea>
                        </div>
                    </div>

                    <div th:replace="~{fragments/admin-archive :: archiveModalFooter(
                            ${'登记日期 ' + #temporals.format(#temporals.createNow(), 'yyyy年M月d日')},
                            ${'取消'},
                            ${'保存归档'})}"></div>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="management-create-modal-overlay"
     data-management-create-modal="users"
     th:attr="data-open-on-load=${openCreateUserModal ? 'true' : null}"
     hidden
     aria-hidden="true">
    <div class="management-create-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="userCreateModalTitle">
        <div class="management-create-modal-shell">
            <button class="management-create-modal-close" type="button" data-management-create-close aria-label="关闭新增用户弹窗">×</button>
            <form method="post"
                  action="/admin/users/save"
                  class="archive-create-form management-create-modal-form">
                <div class="archive-create-card">
                    <div class="archive-top-bar"></div>
                    <div th:replace="~{fragments/admin-archive :: archiveHeaderWithId(
                            ${'账号编号：待生成'},
                            ${'系统<br />用户'},
                            ${'系统用户档案'},
                            ${'userCreateModalTitle'},
                            ${'USER PROFILE'})}"></div>

                    <div class="archive-create-body"
                         th:with="selectedRole=${createUser.role != null ? createUser.role.name() : 'ADMIN'},
                                  selectedStatus=${createUser.status != null ? createUser.status : 'ACTIVE'}">
                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label" for="create-managed-username">登录账号</label>
                                <input class="archive-create-control"
                                       id="create-managed-username"
                                       name="username"
                                       type="text"
                                       th:value="${createUser.username}"
                                       placeholder="请设置登录账号"
                                       data-management-create-autofocus
                                       required />
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label" for="create-managed-password">登录密码</label>
                                <input class="archive-create-control"
                                       id="create-managed-password"
                                       name="password"
                                       type="password"
                                       placeholder="请设置登录密码"
                                       required />
                            </div>
                        </div>

                        <div class="archive-create-row-double">
                            <div class="archive-create-cell">
                                <label class="archive-create-label" id="create-managed-role-label">权限角色</label>
                                <div class="custom-select archive-create-control">
                                    <input type="hidden"
                                           name="role"
                                           data-user-create-role
                                           th:value="${selectedRole}" />
                                    <button type="button"
                                            class="custom-select-trigger"
                                            aria-expanded="false"
                                            aria-labelledby="create-managed-role-label create-managed-role-trigger-text">
                                        <span class="custom-select-trigger-text"
                                              id="create-managed-role-trigger-text"
                                              th:text="${createUser.role != null ? createUser.role.label : '普通管理员'}">普通管理员</span>
                                        <span class="custom-select-arrow" aria-hidden="true"></span>
                                    </button>
                                    <ul class="custom-select-panel">
                                        <li th:if="${roles != null}"
                                            th:each="item : ${roles}"
                                            class="custom-select-option"
                                            th:attr="data-value=${item.name()},data-label=${item.label}"
                                            th:classappend="${selectedRole == item.name()} ? ' is-selected'"
                                            th:text="${item.label}"></li>
                                    </ul>
                                </div>
                            </div>
                            <div class="archive-create-cell">
                                <label class="archive-create-label" for="create-managed-department-name">所属部门</label>
                                <input type="hidden"
                                       name="departmentCode"
                                       data-user-create-department
                                       th:value="${createUser.departmentCode}" />
                                <input class="archive-create-control archive-create-control--readonly"
                                       id="create-managed-department-name"
                                       type="text"
                                       data-user-create-department-label
                                       th:value="${createUser.role == T(org.example.propertyms.user.model.Role).SUPER_ADMIN ? '综合办公室' : (createUser.role == T(org.example.propertyms.user.model.Role).ADMIN ? '管理部' : (createUser.role == T(org.example.propertyms.user.model.Role).ENGINEER ? '工程部' : (createUser.role == T(org.example.propertyms.user.model.Role).ACCOUNTANT ? '财务部' : '无部门')))}"
                                       readonly />
                            </div>
                        </div>

                        <div class="archive-create-row-single">
                            <label class="archive-create-label" id="create-managed-status-label">账号状态</label>
                            <div class="custom-select archive-create-control">
                                <input type="hidden" name="status" th:value="${selectedStatus}" />
                                <button type="button"
                                        class="custom-select-trigger"
                                        aria-expanded="false"
                                        aria-labelledby="create-managed-status-label create-managed-status-trigger-text">
                                    <span class="custom-select-trigger-text"
                                          id="create-managed-status-trigger-text"
                                          th:text="${selectedStatus == 'DISABLED' ? '禁用' : '启用'}">启用</span>
                                    <span class="custom-select-arrow" aria-hidden="true"></span>
                                </button>
                                <ul class="custom-select-panel">
                                    <li class="custom-select-option"
                                        data-value="ACTIVE"
                                        data-label="启用"
                                        th:classappend="${selectedStatus == 'ACTIVE'} ? ' is-selected'">启用</li>
                                    <li class="custom-select-option"
                                        data-value="DISABLED"
                                        data-label="禁用"
                                        th:classappend="${selectedStatus == 'DISABLED'} ? ' is-selected'">禁用</li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div th:replace="~{fragments/admin-archive :: archiveModalFooter(
                            ${'登记日期 ' + #temporals.format(#temporals.createNow(), 'yyyy年M月d日')},
                            ${'取消'},
                            ${'保存'})}"></div>
                </div>
            </form>
        </div>
    </div>
</div>
</th:block>
</body>
</html>
