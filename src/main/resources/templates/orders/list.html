<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>我的订单</title>
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260321a" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico?v=20260321a" />
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="stack-lg">
    <section class="page-header">
        <div>
            <p class="page-kicker">Orders</p>
            <h1 class="page-title">我的订单</h1>
            <p class="page-subtitle">查看订单进度、支付状态与退票入口。</p>
        </div>
        <div class="page-actions">
            <a class="btn" href="/">继续购票</a>
        </div>
    </section>

    <div th:replace="~{fragments :: messages}"></div>

    <div class="card">
        <div class="card-head">
            <h2>订单列表</h2>
            <span class="badge" th:text="${#lists.size(orders)} + ' 笔'">0 笔</span>
        </div>
        <div th:if="${#lists.isEmpty(orders)}" class="empty-state">你还没有订单，去选一场喜欢的电影吧。</div>
        <div class="table-wrap" th:if="${!#lists.isEmpty(orders)}">
            <table class="table">
                <thead>
                <tr>
                    <th>订单号</th>
                    <th>影片</th>
                    <th>影厅</th>
                    <th>场次</th>
                    <th>金额</th>
                    <th>状态</th>
                    <th class="table-actions">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.orderNo}"></td>
                    <td th:text="${movies[shows[order.showId].movieId].title}"></td>
                    <td th:text="${halls[shows[order.showId].hallId].name}"></td>
                    <td th:text="${shows[order.showId].startTime}"></td>
                    <td th:text="${order.totalPrice}"></td>
                    <td><span class="badge" th:text="${order.status.label}" th:attr="data-status=${order.status.name()}"></span></td>
                    <td class="table-actions"><a class="btn" th:href="@{'/orders/' + ${order.id}}">详情</a></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
