<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物业系统 - 个人中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 1.8rem 1.8rem;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
        }

        /* 头部 */
        .user-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #dce3ed;
            margin-bottom: 1.8rem;
        }

        .avatar {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: #eef2f7;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-info h1 {
            font-size: 1.45rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.4rem;
        }

        .user-info p {
            font-size: 0.95rem;
            color: #64748b;
            margin-bottom: 0.3rem;
        }

        .btn-edit {
            margin-top: 0.6rem;
            padding: 0.55rem 1.3rem;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        /* 标题 + 左侧蓝色竖杠 */
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
            margin: 0 0 1.3rem;
            position: relative;
            padding-left: 12px;
        }

        .section-title::before {
            content: "";
            position: absolute;
            left: 0;
            top: 4px;
            width: 3px;
            height: 18px;
            background-color: #2563eb;
            border-radius: 2px;
        }

        /* 基本信息 - 舒适宽松 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .info-item {
            background: #ffffff;
            padding: 1rem 1.2rem;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-size: 0.95rem;
        }

        .info-item .label {
            color: #64748b;
            display: block;
            margin-bottom: 0.4rem;
        }

        .info-item .value {
            color: #1e293b;
            font-weight: 500;
            font-size: 1rem;
        }

        /* 功能项 - 整行、舒适 */
        .func-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.2rem;
            background: #ffffff;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            margin-bottom: 0.75rem;
            cursor: pointer;
        }

        .func-item:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        .func-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .func-icon {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            background: #eff6ff;
            color: #2563eb;
            display: grid;
            place-items: center;
            font-size: 15px;
            flex-shrink: 0;
        }

        .func-name {
            font-size: 0.98rem;
            color: #1e293b;
            font-weight: 500;
        }

        .func-arrow {
            color: #94a3b8;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>
<div class="container">

    <div class="user-header">
        <div class="avatar">
            <img th:src="@{/images/img.png}" alt="头像">
        </div>
        <div class="user-info">
            <h1>管理员 您好</h1>
            <p>admin@wuye.com</p>
            <p>物业系统管理员 · 2023-09-01 入职</p>
        </div>
    </div>

    <div class="section-title">基本信息</div>
    <div class="info-grid">
        <div class="info-item">
            <div class="label">姓名</div>
            <div class="value">管理员</div>
        </div>
        <div class="info-item">
            <div class="label">账号</div>
            <div class="value">admin</div>
        </div>
        <div class="info-item">
            <div class="label">手机号码</div>
            <div class="value">19970440365</div>
        </div>
        <div class="info-item">
            <div class="label">邮箱</div>
            <div class="value">admin@wuye.com</div>
        </div>
        <div class="info-item">
            <div class="label">角色权限</div>
            <div class="value">超级管理员</div>
        </div>
        <div class="info-item">
            <div class="label">账号状态</div>
            <div class="value">正常 · 已启用</div>
        </div>
    </div>

    <div class="section-title">账号功能</div>
    <div class="func-list">
        <div class="func-item">
            <div class="func-left">
                <span class="ico"><img src="/images/lock.svg" alt="lock"></span>
                <div class="func-name">修改密码</div>
            </div>
            <div class="func-arrow">›</div>
        </div>
        <div class="func-item">
            <div class="func-left">
                <span class="ico"><img src="/images/speaker.svg" alt="lock"></span>
                <div class="func-name">消息通知设置</div>
            </div>
            <div class="func-arrow">›</div>
        </div>
        <div class="func-item">
            <div class="func-left">
                <span class="ico"><img src="/images/shield-fill.svg" alt="lock"></span>
                <div class="func-name">安全中心</div>
            </div>
            <div class="func-arrow">›</div>
        </div>
        <div class="func-item">
            <div class="func-left">
                <span class="ico"><img src="/images/phone-one.svg" alt="lock"></span>
                <div class="func-name">登录设备管理</div>
            </div>
            <div class="func-arrow">›</div>
        </div>
        <!-- 退出登录 无下划线 整行可点 -->
        <a href="javascript:;" class="func-item confirm-action" style="text-decoration:none !important;"
           data-message="确定要退出登录吗？"
           data-action="/logout">
            <div class="func-left">
    <span class="ico">
      <img src="/images/door-exit.svg" alt="退出登录">
    </span>
                <div class="func-name">退出登录</div>
            </div>
            <div class="func-arrow">›</div>
        </a>
    </div>

</div>
</body>
</html>
