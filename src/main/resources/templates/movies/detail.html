<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>影片详情</title>
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260321a" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico?v=20260321a" />
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="stack-lg">
    <section class="page-header">
        <div>
            <p class="page-kicker">Movie</p>
            <h1 class="page-title" th:text="${movie.title}">影片详情</h1>
            <p class="page-subtitle">查看影片资料与当日排片，快速进入选座。</p>
        </div>
        <div class="page-actions">
            <a class="btn" href="/">返回首页</a>
            <a class="btn primary" href="/shows">全部排片</a>
        </div>
    </section>

    <div class="card movie-detail-shell">
        <div class="movie-detail-poster">
            <img th:src="${movie.resolvedPosterUrl}"
                 onerror="this.onerror=null;this.src='/css/png/img.png';"
                 alt="movie poster" />
            <div class="movie-detail-poster-glow"></div>
        </div>
        <div class="movie-detail-content">
            <div class="movie-detail-highlight">
                <span class="movie-chip"
                      th:text="${movie.genre != null and !#strings.isEmpty(movie.genre) ? movie.genre : '未分类'}">未分类</span>
                <span class="movie-chip"
                      th:text="${movie.durationMinutes != null ? movie.durationMinutes + ' 分钟' : '时长待定'}">时长待定</span>
                <span class="movie-chip"
                      th:text="${movie.releaseDate != null ? movie.releaseDate : '上映待定'}">上映待定</span>
            </div>
            <div class="movie-detail-meta">
                <div class="meta-item">
                    <span class="meta-label">导演</span>
                    <strong th:text="${movie.director != null and !#strings.isEmpty(movie.director) ? movie.director : '待更新'}"></strong>
                </div>
                <div class="meta-item">
                    <span class="meta-label">主演</span>
                    <strong th:text="${movie.actors != null and !#strings.isEmpty(movie.actors) ? movie.actors : '待更新'}"></strong>
                </div>
                <div class="meta-item">
                    <span class="meta-label">类型</span>
                    <strong th:text="${movie.genre != null and !#strings.isEmpty(movie.genre) ? movie.genre : '未分类'}"></strong>
                </div>
                <div class="meta-item">
                    <span class="meta-label">上映日期</span>
                    <strong th:text="${movie.releaseDate != null ? movie.releaseDate : '待定'}"></strong>
                </div>
            </div>
            <div class="movie-detail-desc">
                <h3>剧情简介</h3>
                <p th:text="${movie.synopsis != null and !#strings.isEmpty(movie.synopsis) ? movie.synopsis : '暂无剧情简介'}"></p>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-head">
            <h2>今日排片</h2>
            <span class="badge" th:text="${#lists.size(shows)} + ' 场'">0 场</span>
        </div>
        <div th:if="${#lists.isEmpty(shows)}" class="empty-state">当前暂无可售场次。</div>
        <div class="movie-show-grid" th:if="${!#lists.isEmpty(shows)}">
            <article class="movie-show-card" th:each="show : ${shows}">
                <div class="movie-show-top">
                    <h3 th:text="${halls[show.hallId].name}">1号厅</h3>
                    <span class="badge" data-tone="accent" th:text="${show.finalPrice} + ' 元'">39.9 元</span>
                </div>
                <p class="movie-show-time">
                    <span th:text="${show.startTime}">2026-03-20T19:30</span>
                    <span class="movie-show-sep">→</span>
                    <span th:text="${show.endTime}">2026-03-20T21:30</span>
                </p>
                <a class="btn primary movie-show-btn" th:href="@{'/shows/' + ${show.id}}">选座购票</a>
            </article>
        </div>
    </div>
</main>
    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
