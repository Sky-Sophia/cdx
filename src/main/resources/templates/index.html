<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>影院售票系统</title>
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260321a" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico?v=20260321a" />
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="home-main">
    <section class="home-hero">
        <div class="home-hero-content">
            <p class="home-kicker">Cinema Collection</p>
            <h1 class="home-title">安静、现代、清晰的在线观影购票体验</h1>
            <p class="home-subtitle">像整理灵感墙一样浏览影片，按喜好快速选片、排片、选座与下单。</p>
            <div class="home-hero-actions">
                <a class="home-btn home-btn-primary" href="#now-showing">浏览影片墙</a>
                <a class="home-btn home-btn-ghost" href="/shows">查看全部场次</a>
            </div>
            <div class="home-meta-strip">
                <span>热映中 <strong th:text="${#lists.size(movies)}">0</strong> 部</span>
                <span>排片与订单全流程在线完成</span>
            </div>
        </div>
        <aside class="home-hero-note">
            <p class="home-note-title">本周观影建议</p>
            <ul class="home-note-list">
                <li>先按类型筛选，再看评分与时长</li>
                <li>工作日晚场通常更容易选到中区座位</li>
                <li>下单前可先进入场次页核对影厅与时间</li>
            </ul>
        </aside>
    </section>

    <div th:replace="~{fragments :: messages}"></div>

    <section class="home-section home-pin-section" id="now-showing">
        <div class="home-section-head">
            <div>
                <p class="home-section-kicker">Masonry Board</p>
                <h2>正在热映</h2>
            </div>
            <a class="home-link" href="/shows">场次总览</a>
        </div>
        <div th:if="${#lists.isEmpty(movies)}" class="home-empty">暂无影片，稍后再来看看。</div>
        <div class="home-pinboard" th:if="${!#lists.isEmpty(movies)}">
            <a th:each="movie, stat : ${movies}"
               class="home-pin-card"
               th:classappend="${stat.index == 0} ? ' pin-feature' : (${stat.index % 5 == 0} ? ' pin-tall' : (${stat.index % 3 == 0} ? ' pin-wide' : ''))"
               th:href="@{'/movies/' + ${movie.id}}">
                <div class="pin-media">
                    <img th:src="${movie.resolvedPosterUrl}"
                         onerror="this.onerror=null;this.src='/css/png/img.png';"
                         alt="poster"
                         class="pin-img" />
                </div>
                <div class="pin-body">
                    <div class="pin-top">
                        <h3 th:text="${movie.title}"></h3>
                        <span class="home-genre"
                              th:text="${movie.genre != null and !#strings.isEmpty(movie.genre) ? movie.genre : '未分类'}">未分类</span>
                    </div>
                    <p class="pin-meta">导演：<span th:text="${movie.director != null and !#strings.isEmpty(movie.director) ? movie.director : '待更新'}"></span></p>
                    <p class="pin-meta pin-meta-ellipsis">主演：<span th:text="${movie.actors != null and !#strings.isEmpty(movie.actors) ? movie.actors : '待更新'}"></span></p>
                    <p class="pin-summary"
                       th:text="${movie.synopsis != null and !#strings.isEmpty(movie.synopsis) ? movie.synopsis : '暂无简介'}"></p>
                    <div class="pin-foot">
                        <span class="home-pill"
                              th:text="${movie.durationMinutes != null ? movie.durationMinutes + ' 分钟' : '时长待定'}">时长待定</span>
                        <span class="home-pill"
                              th:text="${movie.releaseDate != null ? movie.releaseDate : '上映待定'}">上映待定</span>
                        <span class="home-cta">查看详情</span>
                    </div>
                </div>
            </a>
        </div>
    </section>
</main>
<script>
    (function () {
        var pinboard = document.querySelector('.home-pinboard');
        if (!pinboard) {
            return;
        }
        var cards = Array.from(pinboard.querySelectorAll('.home-pin-card'));
        if (cards.length === 0) {
            return;
        }

        var laneCount = 4;
        var lanes = Array.from({length: laneCount}, function (_, index) {
            var lane = document.createElement('div');
            lane.className = 'home-lane ' + (index % 2 === 0 ? 'lane-up' : 'lane-down');

            var track = document.createElement('div');
            track.className = 'lane-track';

            var primary = document.createElement('div');
            primary.className = 'lane-set';

            var copy = document.createElement('div');
            copy.className = 'lane-set lane-set-copy';

            track.appendChild(primary);
            track.appendChild(copy);
            lane.appendChild(track);
            return {lane: lane, primary: primary, copy: copy};
        });

        cards.forEach(function (card, index) {
            lanes[index % laneCount].primary.appendChild(card);
        });

        var activeLanes = lanes.filter(function (item) {
            return item.primary.children.length > 0;
        });
        if (activeLanes.length === 0) {
            return;
        }

        pinboard.innerHTML = '';
        activeLanes.forEach(function (item) {
            var primaryCards = Array.from(item.primary.children);
            if (primaryCards.length > 1) {
                primaryCards.forEach(function (card) {
                    item.copy.appendChild(card.cloneNode(true));
                });
            } else {
                item.lane.classList.add('lane-static');
                item.copy.remove();
            }
            pinboard.appendChild(item.lane);
        });
        pinboard.classList.add('is-lane-ready');
    })();
</script>
    <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
