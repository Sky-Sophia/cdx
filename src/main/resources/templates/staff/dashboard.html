<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>员工面板</title>
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260321a" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico?v=20260321a" />
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="stack-lg">
    <section class="page-header">
        <div>
            <p class="page-kicker">Staff</p>
            <h1 class="page-title">员工工作台</h1>
            <p class="page-subtitle">在这里查询排片并处理订单现场工作。</p>
        </div>
    </section>

    <div class="action-grid">
        <a class="card action-card" href="/staff/shows">
            <h3>排片查询</h3>
            <p class="muted">按日期和影厅快速定位场次。</p>
            <span class="home-cta">进入排片查询</span>
        </a>
        <a class="card action-card" href="/staff/orders">
            <h3>订单管理</h3>
            <p class="muted">查看订单状态与购票信息。</p>
            <span class="home-cta">进入订单管理</span>
        </a>
    </div>
</main>
</body>
</html>
