<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>订单管理</title>
    <link rel="stylesheet" href="/css/app.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260321a" />
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico?v=20260321a" />
</head>
<body>
<div th:replace="~{fragments :: nav}"></div>
<main class="stack-lg">
    <section class="page-header">
        <div>
            <p class="page-kicker">Staff</p>
            <h1 class="page-title">订单管理</h1>
            <p class="page-subtitle">追踪订单状态，辅助现场售票与核对。</p>
        </div>
    </section>

    <div class="card">
        <form class="form-inline" method="get" action="/staff/orders">
            <div class="form-row">
                <label>状态</label>
                <select name="status">
                    <option value="">全部</option>
                    <option th:each="st : ${statuses}" th:value="${st}" th:text="${st.label}" th:selected="${status == st}"></option>
                </select>
            </div>
            <div class="form-actions">
                <button class="btn" type="submit">筛选</button>
                <a class="btn" href="/staff/orders">重置</a>
            </div>
        </form>
    </div>

    <div class="card">
        <div class="card-head">
            <h2>订单列表</h2>
            <span class="badge" th:text="${#lists.size(orders)} + ' 笔'">0 笔</span>
        </div>
        <div th:if="${#lists.isEmpty(orders)}" class="empty-state">暂无订单数据。</div>
        <div class="table-wrap" th:if="${!#lists.isEmpty(orders)}">
            <table class="table">
                <thead>
                <tr>
                    <th>订单号</th>
                    <th>用户</th>
                    <th>影片</th>
                    <th>影厅</th>
                    <th>场次</th>
                    <th>金额</th>
                    <th>状态</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}">
                    <td th:text="${order.orderNo}"></td>
                    <td th:text="${users[order.userId].username}"></td>
                    <td th:text="${movies[shows[order.showId].movieId].title}"></td>
                    <td th:text="${halls[shows[order.showId].hallId].name}"></td>
                    <td th:text="${shows[order.showId].startTime}"></td>
                    <td th:text="${order.totalPrice}"></td>
                    <td><span class="badge" th:text="${order.status.label}" th:attr="data-status=${order.status.name()}"></span></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
