spring.application.name=property-management-system-test

spring.datasource.url=jdbc:h2:mem:property_pms_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.sql.init.mode=never
spring.task.scheduling.pool.size=0

mybatis.type-aliases-package=org.example.propertyms.**.model
mybatis.configuration.map-underscore-to-camel-case=true
