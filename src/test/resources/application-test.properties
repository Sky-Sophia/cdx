spring.application.name=java-web-demo-test

spring.datasource.url=jdbc:h2:mem:java_web_demo_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.sql.init.mode=never
spring.task.scheduling.enabled=false

mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=org.example.javawebdemo.model
mybatis.configuration.map-underscore-to-camel-case=true
